<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#f5f5f5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="关门">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233b6ff5'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='52' font-weight='700' font-family='system-ui'>关</text></svg>">
<title>关门</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100dvh}
#app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;background:#f5f5f5}

/* Header */
.header{display:flex;align-items:center;padding:12px 16px;background:#fff;gap:12px}
.header .back{font-size:20px;color:#333;background:none;border:none;cursor:pointer;padding:4px}
.header h1{font-size:18px;font-weight:600;flex:1}
.header .hdate{font-size:13px;color:#999}

/* Content */
.content{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding-bottom:80px}

/* Revenue card */
.rev-card{background:linear-gradient(135deg,#3b6ff5,#5b8ff9);border-radius:16px;padding:20px;color:#fff;position:relative;overflow:hidden}
.rev-card::after{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.06)}
.rev-card .rev-label{font-size:14px;opacity:.85;margin-bottom:8px}
.rev-card .rev-value{font-size:36px;font-weight:700;letter-spacing:-1px;margin-bottom:6px}
.rev-card .rev-sub{font-size:12px;opacity:.6}
.rev-card .rev-btn{position:absolute;right:18px;bottom:18px;background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit}
.rev-card .rev-btn:active{background:rgba(255,255,255,.35)}

/* Chart section */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chart-card{background:#fff;border-radius:16px;padding:16px}
.chart-card h3{font-size:14px;font-weight:600;margin-bottom:12px;color:#333}
.chart-card canvas{display:block;margin:0 auto}
.chart-legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px}
.chart-legend span{font-size:11px;color:#888;display:flex;align-items:center;gap:4px}
.chart-legend i{width:8px;height:8px;border-radius:2px;display:inline-block}

/* Profit card */
.profit-card{background:#fff;border-radius:16px;padding:18px 20px;display:flex;justify-content:space-between;align-items:center}
.profit-card .pf-label{font-size:14px;color:#666}
.profit-card .pf-value{font-size:28px;font-weight:700;color:#1a1a1a;letter-spacing:-.5px}
.profit-card .pf-pct{font-size:16px;font-weight:600;color:#ff6b6b;padding:4px 10px;background:#fff0f0;border-radius:8px}

/* Bottom nav */
.bnav{display:flex;background:#fff;border-top:1px solid #eee;padding:8px 12px max(8px,env(safe-area-inset-bottom))}
.bnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px;border:none;background:none;cursor:pointer;font-size:10px;color:#999;font-family:inherit}
.bnav button.active{color:#3b6ff5}
.bnav button .bicon{font-size:22px}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal.on{display:flex}
.sheet{background:#fff;width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:20px 18px 34px;animation:up .25s ease-out}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet .handle{width:36px;height:4px;border-radius:2px;background:#ddd;margin:0 auto 18px}
.sheet h3{font-size:18px;font-weight:600;text-align:center;margin-bottom:20px}
.frow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f0f0}
.frow .fl{font-size:14px;color:#555;display:flex;align-items:center;gap:8px}
.frow .fl .dot{width:10px;height:10px;border-radius:3px}
.frow input{width:130px;padding:10px 12px;border:1px solid #e5e5e5;border-radius:10px;font-size:16px;text-align:right;outline:none;background:#fafafa;font-family:inherit}
.frow input:focus{border-color:#3b6ff5;background:#fff}
.sheet .btns{display:flex;gap:10px;margin-top:20px}
.sheet .btns button{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.btn-save{background:#3b6ff5;color:#fff}
.btn-cancel{background:#f0f0f0;color:#666}
.btn-save:active,.btn-cancel:active{transform:scale(.97)}

/* Toast */
.toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(120px);z-index:300;background:#333;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;transition:transform .3s;pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}

/* Pages */
.page{display:none;flex-direction:column;flex:1}
.page.on{display:flex}
</style>
</head>
<body>
<div id="app">
  <!-- ===== DASHBOARD ===== -->
  <div class="page on" id="pageDash">
    <div class="header"><span class="back">‹</span><h1>数据看板</h1><span class="hdate" id="hdate"></span></div>
    <div class="content">
      <div class="rev-card">
        <div class="rev-label">今日营收</div>
        <div class="rev-value" id="revVal">¥0</div>
        <div class="rev-sub" id="revSub">较昨日 --</div>
        <button class="rev-btn" onclick="openModal()">＋ 记一笔</button>
      </div>
      <div class="chart-row" id="chartsArea"></div>
      <div class="profit-card">
        <div><div class="pf-label">今日毛利</div><div class="pf-value" id="profitVal">¥0</div></div>
        <div class="pf-pct" id="profitPct">0%</div>
      </div>
    </div>
    <div class="bnav">
      <button id="navDash"><span class="bicon">🧾</span>数据</button>
      <button id="navHist"><span class="bicon">📋</span>记录</button>
      <button id="navExport"><span class="bicon">📤</span>导出</button>
    </div>
  </div>

  <!-- ===== HISTORY ===== -->
  <div class="page" id="pageHist">
    <div class="header"><span class="back" onclick="goPage('dash')">‹</span><h1>历史记录</h1></div>
    <div class="content" id="histContent"></div>
    <div class="bnav">
      <button id="navDash2"><span class="bicon">🧾</span>数据</button>
      <button id="navHist2"><span class="bicon">📋</span>记录</button>
      <button id="navExport2"><span class="bicon">📤</span>导出</button>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="sheet">
    <div class="handle"></div><h3>今日对账</h3>
    <div class="frow"><span class="fl"><span class="dot" style="background:#3b6ff5"></span>微信</span><input id="mw" type="number" placeholder="0" inputmode="decimal"></div>
    <div class="frow"><span class="fl"><span class="dot" style="background:#f5a623"></span>支付宝</span><input id="ma" type="number" placeholder="0" inputmode="decimal"></div>
    <div class="frow"><span class="fl"><span class="dot" style="background:#7ed321"></span>现金</span><input id="mc" type="number" placeholder="0" inputmode="decimal"></div>
    <div class="frow"><span class="fl"><span class="dot" style="background:#8b7ec8"></span>进货成本</span><input id="mcost" type="number" placeholder="0" inputmode="decimal"></div>
    <div class="frow"><span class="fl"><span class="dot" style="background:#e0a060"></span>赊账</span><input id="mcr" type="number" placeholder="0" inputmode="decimal"></div>
    <div class="btns"><button class="btn-cancel" id="btnCancel">取消</button><button class="btn-save" id="btnSave">保存</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============ DATA ============
const K='gm';
function ld(){try{return JSON.parse(localStorage.getItem(K)||'[]')}catch(e){return[]}}
function sv(d){localStorage.setItem(K,JSON.stringify(d))}
function today(){return new Date().toISOString().slice(0,10)}
function fm(n){return n.toLocaleString('zh-CN',{minimumFractionDigits:0,maximumFractionDigits:0})}

// Demo
if(!ld().length){const a=[];const n=new Date();for(let i=6;i>=0;i--){const d=new Date(n);d.setDate(n.getDate()-i);const ds=d.toISOString().slice(0,10);a.push({date:ds,wx:~~(2000+Math.random()*2000),ali:~~(500+Math.random()*800),cash:~~(200+Math.random()*400),cost:~~(400+Math.random()*700),credit:Math.random()>.5?~~(Math.random()*100):0})}sv(a)}

// ============ RENDER ============
const COLORS={wx:'#3b6ff5',ali:'#f5a623',cash:'#7ed321',cost:'#8b7ec8',credit:'#e0a060'};

function drawRing(segs,label,total){
  const r=52;const c=62;const w=16;const circ=2*Math.PI*r;let offset=0;let paths='';
  segs.filter(x=>x.v>0).forEach(s=>{const pct=s.v/(total||1);const len=pct*circ;paths+=`<circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${s.c}" stroke-width="${w}" stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${-(offset*circ)}" transform="rotate(-90 ${c} ${c})"/>`;offset+=pct});
  const leg=segs.filter(x=>x.v>0).map(s=>`<span><i style="background:${s.c}"></i>${s.l} ${Math.round(s.v/(total||1)*100)}%</span>`).join('');
  return `<svg viewBox="0 0 124 124" style="width:110px;height:110px">${paths}<text x="${c}" y="${c-4}" text-anchor="middle" font-size="12" font-weight="600" fill="#333">${label}</text><text x="${c}" y="${c+14}" text-anchor="middle" font-size="10" fill="#999">¥${fm(total)}</text></svg><div class="chart-legend">${leg}</div>`;
}

function renderDash(){
  const all=ld();const td=all.find(x=>x.date===today());const wk=all.filter(x=>{const d=new Date(x.date);const n=new Date();const day=n.getDay();const mon=new Date(n);mon.setDate(n.getDate()-(day===0?6:day-1));mon.setHours(0,0,0,0);const sun=new Date(mon);sun.setDate(mon.getDate()+6);return d>=mon&&d<=sun});
  const yest=all.filter(x=>x.date!==today()).sort((a,b)=>b.date.localeCompare(a.date))[0];
  const rev=td?td.wx+td.ali+td.cash:0;const cost=td?td.cost:0;const profit=rev-cost-(td?td.credit:0);
  const yrev=yest?yest.wx+yest.ali+yest.cash:0;const yprofit=yrev-(yest?yest.cost:0)-(yest?yest.credit:0);
  const diff=profit-yprofit;const pct=rev>0?Math.round(profit/rev*100):0;

  document.getElementById('revVal').textContent='¥'+fm(rev);
  document.getElementById('revSub').textContent=yest?'较昨日 '+(diff>=0?'+':'')+'¥'+fm(diff):'暂无昨日数据';
  document.getElementById('profitVal').textContent='¥'+fm(profit);
  document.getElementById('profitPct').textContent=pct+'%';
  document.getElementById('profitPct').style.color='#ff6b6b';
  document.getElementById('hdate').textContent=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'/');

  const chData=wk.length?wk:all.slice(0,7);
  const tw=chData.reduce((s,x)=>s+x.wx,0);const ta=chData.reduce((s,x)=>s+x.ali,0);const tca=chData.reduce((s,x)=>s+x.cash,0);
  const trev=tw+ta+tca||1;const tc=chData.reduce((s,x)=>s+x.cost,0);
  document.getElementById('chartsArea').innerHTML=
    `<div class="chart-card"><h3>收款构成</h3>${drawRing([{l:'微信',v:tw,c:COLORS.wx},{l:'支付宝',v:ta,c:COLORS.ali},{l:'现金',v:tca,c:COLORS.cash}],'总收款',trev)}</div>
     <div class="chart-card"><h3>成本构成</h3>${tc?drawRing([{l:'进货',v:tc,c:COLORS.cost}],'总成本',tc):'<p style="color:#999;font-size:13px;text-align:center;padding:20px">暂无</p>'}</div>`;
}

function renderHist(){
  const all=ld().sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('histContent').innerHTML=all.length?all.map(x=>{
    const r=x.wx+x.ali+x.cash;const p=r-x.cost-x.credit;
    return `<div style="background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="editRec('${x.date}')"><div><div style="font-size:14px;font-weight:500">${x.date.slice(5)}</div><div style="font-size:11px;color:#999;margin-top:2px">收${fm(r)} · 进${fm(x.cost)} · 赊${fm(x.credit)}</div></div><div style="font-size:16px;font-weight:700;color:${p>=0?'#333':'#ff4757'}">¥${fm(p)}</div></div>`;
  }).join(''):'<p style="text-align:center;color:#999;padding:40px">暂无记录</p>';
}

// ============ MODAL ============
function openModal(){const td=ld().find(x=>x.date===today());document.getElementById('mw').value=td?td.wx:'';document.getElementById('ma').value=td?td.ali:'';document.getElementById('mc').value=td?td.cash:'';document.getElementById('mcost').value=td?td.cost:'';document.getElementById('mcr').value=td?td.credit:'';document.getElementById('modal').classList.add('on');setTimeout(()=>document.getElementById('mw').focus(),300)}
function closeModal(){document.getElementById('modal').classList.remove('on')}
function editRec(ds){const td=ld().find(x=>x.date===ds);if(!td)return;document.getElementById('mw').value=td.wx;document.getElementById('ma').value=td.ali;document.getElementById('mc').value=td.cash;document.getElementById('mcost').value=td.cost;document.getElementById('mcr').value=td.credit;document.getElementById('modal').classList.add('on')}
document.getElementById('btnCancel').onclick=closeModal;
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.getElementById('btnSave').onclick=function(){
  const data={date:today(),wx:+document.getElementById('mw').value||0,ali:+document.getElementById('ma').value||0,cash:+document.getElementById('mc').value||0,cost:+document.getElementById('mcost').value||0,credit:+document.getElementById('mcr').value||0};
  const all=ld();const idx=all.findIndex(x=>x.date===data.date);
  if(idx>=0)all[idx]=data;else all.push(data);
  sv(all);closeModal();renderDash();renderHist();toast('✅ 已保存');
};

// ============ PAGES ============
function goPage(p){
  document.getElementById('pageDash').classList.toggle('on',p==='dash');
  document.getElementById('pageHist').classList.toggle('on',p==='hist');
  if(p==='dash')renderDash();if(p==='hist')renderHist();
}
// Nav buttons
function setNav(n){['Dash','Hist','Export'].forEach(x=>{const b=document.getElementById('nav'+x);if(b)b.classList.toggle('active',x===n);const b2=document.getElementById('nav'+x+'2');if(b2)b2.classList.toggle('active',x===n)})}
document.getElementById('navDash').onclick=()=>{goPage('dash');setNav('Dash')};
document.getElementById('navHist').onclick=()=>{goPage('hist');setNav('Hist')};
document.getElementById('navExport').onclick=()=>{const all=ld();if(!all.length){toast('暂无数据');return}let c='日期,微信,支付宝,现金,进货,赊账,利润\n';all.forEach(x=>{const r=x.wx+x.ali+x.cash;c+=`${x.date},${x.wx},${x.ali},${x.cash},${x.cost},${x.credit},${r-x.cost-x.credit}\n`});const b=new Blob(['﻿'+c],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='关门_'+today()+'.csv';a.click();URL.revokeObjectURL(u);toast('📤 已导出')};
document.getElementById('navDash2').onclick=()=>{goPage('dash');setNav('Dash')};
document.getElementById('navHist2').onclick=()=>{goPage('hist');setNav('Hist')};
document.getElementById('navExport2').onclick=document.getElementById('navExport').onclick;
// Initial
setNav('Dash');

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),1800)}

renderDash();
if('serviceWorker' in navigator)window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{})});
</script>
</body>
</html>
