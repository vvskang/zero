<style>
/* ============ ROOT ============ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:#07070d;color:#c8c8d8;min-height:100dvh;line-height:1.6;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;top:-40%;left:-30%;width:160%;height:160%;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 25% 15%,rgba(139,92,246,.05) 0%,transparent 55%),
              radial-gradient(ellipse at 70% 50%,rgba(99,102,241,.04) 0%,transparent 55%),
              radial-gradient(ellipse at 40% 85%,rgba(236,72,153,.03) 0%,transparent 50%);
  animation:bgShift 25s ease-in-out infinite;
}
@keyframes bgShift{0%,100%{transform:translate(0,0)}33%{transform:translate(1.5%,-1%)}66%{transform:translate(-1%,1.5%)}}

#app{position:relative;z-index:1;width:100%;max-width:560px;margin:0 auto;padding:20px 16px 80px;min-height:100dvh}
.screen{display:none;flex-direction:column;flex:1}
.screen.active{display:flex}

/* ============ GLASS ============ */
.glass{
  background:rgba(16,16,26,.65);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,.05);border-radius:22px;padding:22px;transition:all .25s;
}
.glass:hover{border-color:rgba(139,92,246,.2)}
.glass-sm{background:rgba(16,16,26,.5);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.04);border-radius:16px;padding:14px 16px;transition:all .2s}
.glass-sm:hover{border-color:rgba(139,92,246,.15)}

/* ============ BUTTONS ============ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 22px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .2s;text-decoration:none}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#6366f1);color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.2)}
.btn-primary:hover{box-shadow:0 6px 28px rgba(124,58,237,.35);transform:translateY(-1px)}
.btn-primary:disabled{background:#2a2848;color:#585878;box-shadow:none;cursor:not-allowed;transform:none}
.btn-outline{background:transparent;color:#9898b0;border:1px solid rgba(255,255,255,.08)}
.btn-outline:hover{border-color:rgba(139,92,246,.35);color:#c0c0d8}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:10px}
.btn-ghost{background:none;border:none;color:#686888;font-size:14px;cursor:pointer;font-family:inherit}

/* ============ HOME ============ */
.logo-wrap{text-align:center;margin:44px 0 8px}
.logo{
  font-size:84px;font-weight:950;letter-spacing:-5px;
  background:linear-gradient(160deg,#c4b5fd 0%,#818cf8 35%,#6366f1 70%,#a78bfa 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 28px rgba(139,92,246,.25));
}
.tagline{text-align:center;color:#585878;font-size:13px;letter-spacing:2.5px;margin-bottom:4px}
.sub-tag{text-align:center;color:#383858;font-size:11px;margin-bottom:36px}

/* Main CTA */
.cta-card{text-align:center}
.cta-card .cta-icon{font-size:44px;margin-bottom:12px}
.cta-card .cta-title{font-size:20px;font-weight:700;color:#d8d8e8;margin-bottom:6px}
.cta-card .cta-desc{font-size:13px;color:#686898;margin-bottom:18px;line-height:1.6}
.cta-input{

.cta-input:focus{border-color:rgba(139,92,246,.4)}

.cta-btns{display:flex;gap:8px;margin-top:10px}

/* Section divider */
.divider{display:flex;align-items:center;gap:12px;margin:36px 0 18px}
.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.04)}
.divider-label{font-size:12px;color:#484868;letter-spacing:2px;white-space:nowrap}

/* ============ CASE LIBRARY ============ */
.tab-row{display:flex;gap:4px;margin-bottom:16px;background:rgba(16,16,26,.5);border-radius:14px;padding:4px}
.tab{

}
.tab.active{background:rgba(124,58,237,.12);color:#a78bfa;border-color:rgba(139,92,246,.2)}

.case-grid{display:flex;flex-direction:column;gap:10px}
.case-card{

  border:1px solid rgba(255,255,255,.04);border-radius:18px;padding:18px;cursor:pointer;

.case-card::after{

}
.case-card:hover::after{opacity:1}
.case-card:hover{border-color:rgba(139,92,246,.18);transform:translateY(-1px)}

.case-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.case-icon{

.case-icon.win{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.15)}
.case-icon.lose{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.12)}
.case-meta{flex:1;min-width:0}
.case-name{font-size:15px;font-weight:700;color:#c8c8d8;margin-bottom:2px}
.case-tag-row{display:flex;gap:6px;align-items:center}
.case-tag{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600;letter-spacing:.5px}
.case-tag.win{background:rgba(245,158,11,.1);color:#f59e0b}
.case-tag.lose{background:rgba(239,68,68,.1);color:#f87171}
.case-cat{font-size:11px;color:#585878}
.case-body{font-size:13px;color:#7878a0;line-height:1.65;margin-bottom:10px}
.case-stats{display:flex;gap:16px;font-size:12px;color:#585878}

/* ============ ONBOARDING ============ */
.ob-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.ob-back{background:none;border:none;color:#686888;font-size:14px;cursor:pointer;font-family:inherit}

.ob-bar{flex:1;height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.ob-bar-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#6366f1);border-radius:2px;transition:width .3s}
.ob-q{font-size:22px;font-weight:700;margin-bottom:6px;color:#d0d0e0;line-height:1.4}
.ob-d{font-size:13px;color:#585878;margin-bottom:20px}
.opt-list{display:flex;flex-direction:column;gap:8px}
.opt{

.tags{display:flex;flex-wrap:wrap;gap:8px}
.tag{

.tag:hover{border-color:rgba(139,92,246,.25)}
.tag.sel{border-color:#7c3aed;background:rgba(124,58,237,.08);color:#c4b5fd}
.ob-acts{margin-top:24px;display:flex;gap:10px}
.free-in{

}
.free-in:focus{border-color:rgba(139,92,246,.4)}
.free-in::placeholder{color:#383858}

/* ============ WORKFLOW ============ */
.wf-title{font-size:22px;font-weight:700;text-align:center;margin:30px 0 6px}
.wf-sub{text-align:center;color:#585878;font-size:13px;margin-bottom:36px}
.pipe{position:relative}
.pipe::before{content:'';position:absolute;left:21px;top:28px;bottom:28px;width:1px;background:rgba(255,255,255,.04);z-index:0}
.pipe-i{display:flex;align-items:flex-start;gap:14px;padding:16px 0;position:relative;z-index:1}
.pipe-d{
  width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:15px;font-weight:700;transition:all .4s;
  background:rgba(16,16,26,.7);border:2px solid rgba(255,255,255,.04);color:#484868;
}
.pipe-d.run{border-color:#7c3aed;background:rgba(124,58,237,.12);color:#a78bfa;animation:dotP 1.2s ease-in-out infinite}
.pipe-d.ok{border-color:#10b981;background:rgba(16,185,129,.08);color:#34d399}
.pipe-d.err{border-color:#ef4444;background:rgba(239,68,68,.08);color:#f87171}
@keyframes dotP{0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,.35)}50%{box-shadow:0 0 18px 5px rgba(124,58,237,.08)}}
.pipe-info{flex:1;min-width:0}
.pipe-n{font-size:14px;font-weight:600;color:#585878;transition:color .3s}
.pipe-i.run .pipe-n{color:#a898e0}
.pipe-i.ok .pipe-n{color:#7878a0}
.pipe-sub{font-size:12px;color:#404068;margin-top:4px;overflow:hidden;max-height:0;transition:max-height .3s}
.pipe-i.run .pipe-sub{max-height:200px}
.wf-ok{text-align:center;margin-top:30px;opacity:0;transform:translateY(10px);transition:all .5s}
.wf-ok.show{opacity:1;transform:translateY(0)}
.wf-ok-icon{font-size:52px;margin-bottom:8px}

/* ============ REPORT ============ */
.r-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.r-head h1{font-size:24px;font-weight:800;color:#d0d0e0}
.r-card{background:rgba(16,16,26,.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.04);border-radius:18px;padding:20px;margin-bottom:12px}
.r-card h2{font-size:17px;margin-bottom:12px;color:#c0c0d8}
.r-card h3{font-size:15px;color:#a0a0c0;margin:14px 0 6px}
.r-card p{font-size:14px;color:#7878a0;line-height:1.7;margin-bottom:6px}
.r-card li{font-size:14px;color:#7878a0;margin-bottom:4px}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:8px}
.badge-h{background:rgba(16,185,129,.1);color:#34d399}
.badge-m{background:rgba(245,158,11,.1);color:#fbbf24}
.ptbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.ptbl th{text-align:left;padding:8px 10px;color:#606080;font-weight:500;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.ptbl td{padding:8px 10px;color:#707098;border-bottom:1px solid rgba(255,255,255,.02);vertical-align:top}
.ptbl tr:hover td{background:rgba(16,16,26,.3)}

/* ============ HISTORY ============ */
.h-list{display:flex;flex-direction:column;gap:8px}
.h-item{background:rgba(16,16,26,.4);border:1px solid rgba(255,255,255,.04);border-radius:14px;padding:14px 16px;cursor:pointer;transition:all .2s}
.h-item:hover{border-color:rgba(139,92,246,.2)}
.h-item .hd{font-size:11px;color:#484868;margin-bottom:3px}
.h-item .ht{font-size:14px;font-weight:600;color:#a0a0c0}
.h-item .hp{font-size:12px;color:#585878;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{text-align:center;padding:60px 20px;color:#404058}
.empty .ei{font-size:48px;margin-bottom:12px}

/* ============ SETTINGS ============ */
.s-row{margin-bottom:20px}
.s-row label{display:block;font-size:12px;color:#585878;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase}
.s-row input{width:100%;padding:12px 14px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.06);border-radius:12px;color:#c8c8d8;font-size:14px;outline:none;font-family:monospace}
.s-row input:focus{border-color:rgba(139,92,246,.4)}
.s-hint{font-size:11px;color:#383858;margin-top:6px;line-height:1.5}
.s-hint a{color:#7c3aed}

/* Toast */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(120px);z-index:200;background:rgba(20,18,38,.95);border:1px solid rgba(139,92,246,.2);color:#b0a0e0;padding:10px 20px;border-radius:14px;font-size:14px;transition:transform .3s;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Gear */
.gear{position:fixed;top:14px;right:14px;z-index:100;width:38px;height:38px;border-radius:12px;background:rgba(16,16,26,.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#585878;font-size:16px;transition:all .2s}
.gear:hover{border-color:rgba(139,92,246,.25);color:#9898b8}

@media(max-width:380px){
  .logo{font-size:62px}.case-stats{gap:8px;flex-wrap:wrap}.cta-btns{flex-direction:column}
  .tab{font-size:12px;padding:8px}
}
@media print{body{background:#fff}.glass,.r-card,.case-card{background:#fff;border:1px solid #ddd}.btn,.gear{display:none!important}}
</style>
</head>

function renderCases(tab){
  S.caseTab=tab;
  const filtered=tab==='all'?CASES:CASES.filter(c=>c.win===(tab==='win'));
  const g=$('caseGrid');
  g.innerHTML=filtered.map(c=>`
    <div class="case-card" data-id="${c.id}" onclick="toggleCase('${c.id}')">
      <div class="case-head">
        <div class="case-icon ${c.win?'win':'lose'}">${c.icon}</div>
        <div class="case-meta">
          <div class="case-name">${c.name}</div>
          <div class="case-tag-row">
            <span class="case-tag ${c.win?'win':'lose'}">${c.win?'成功':'失败'}</span>
            <span class="case-cat">${c.cat}</span>
          </div>
        </div>
      </div>
      <div class="case-body">${c.desc}</div>
      <div class="case-stats"><span>📊 ${c.stats}</span></div>
      <div class="case-detail" id="detail-${c.id}">
        <h4>📖 完整故事</h4><p>${c.body}</p>
        <h4>💡 核心教训</h4><p>${c.lesson}</p>
      </div>
    </div>
  `).join('');
}

function toggleCase(id){
  const d=$('detail-'+id);
  if(!d)return;
  const all=document.querySelectorAll('.case-detail');
  all.forEach(el=>{if(el!==d)el.classList.remove('show')});
  d.classList.toggle('show');
  if(d.classList.contains('show')){setTimeout(()=>d.scrollIntoView({behavior:'smooth',block:'nearest'}),100)}
}

function buildPipe(steps){return steps.map(s=>`<div class="pipe-i" id="node-${s.id}"><div class="pipe-d" id="dot-${s.id}">${steps.indexOf(s)+1}</div><div class="pipe-info"><div class="pipe-n">${s.name}</div><div style="font-size:12px;color:#404068">${s.desc}</div><div class="pipe-sub" id="sub-${s.id}"><span>${s.d}</span>${(s.sub||[]).map(ss=>`<span>↳ ${ss}</span>`).join('')}</div></div></div>`).join('')}

async function startWf(){
  const mode=S.obMode;const steps=WF[mode];S.wfSteps=steps;S.reportData=null;
  goScreen('workflow');$('pipeline').innerHTML=buildPipe(steps);$('wfDone').classList.remove('show');$('btnViewReport').style.display='none';
  if(!getKey()){toast('⚠️ 未配置API Key');markStep(steps[0].id,'err');return}
  try{for(let i=0;i<steps.length;i++){const s=steps[i];markStep(s.id,'run');await sleep(500);s._r=await execStep(s,i,mode);markStep(s.id,'ok')}
    S.reportData=assemble(steps,mode);saveReport(S.reportData);$('wfDone').classList.add('show');$('btnViewReport').style.display='inline-block';$('btnViewReport').onclick=()=>renderReport(S.reportData);
  }catch(e){const r=steps.find(s=>{const d=$('dot-'+s.id);return d&&d.classList.contains('run')});if(r)markStep(r.id,'err');toast('❌ '+ (e.message||'出错'))}
}
function markStep(id,st){const dot=$('dot-'+id),node=$('node-'+id);if(!dot||!node)return;dot.classList.remove('run','ok','err');node.classList.remove('run','ok','err');if(st==='run'){dot.classList.add('run');node.classList.add('run');dot.textContent='◉'}else if(st==='ok'){dot.classList.add('ok');node.classList.add('ok');dot.textContent='✓'}else{dot.classList.add('err');node.classList.add('err');dot.textContent='✗'}}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// ========================= DEEPSEEK =========================
async function callDS(sys,usr,json=true){
  const b={model:'deepseek-chat',messages:[{role:'system',content:sys},{role:'user',content:usr}],temperature:.7,max_tokens:4096};
  if(json)b.response_format={type:'json_object'};
  const r=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${getKey()}`},body:JSON.stringify(b)});
  if(!r.ok){const e=await r.json().catch(()=>({}));if(r.status===401)throw new Error('Key无效');if(r.status===402)throw new Error('余额不足');throw new Error(e.error?.message||`API ${r.status}`)}
  const d=await r.json();const c=d.choices[0].message.content;
  if(json){try{return JSON.parse(c)}catch(e){const m=c.match(/```(?:json)?\s*([\s\S]*?)```/);if(m)return JSON.parse(m[1]);throw new Error('格式异常')}}return c;
}
async function execStep(s,i,mode){

    if(s.id==='s')return await callDS('你是市场分析师。中国2025-2026个人低门槛副业三个赛道各3个机会。JSON：{"t1":{"name":"内容/AI","opps":[{"name":"","desc":"","income":"","cost":"","why":""}]},"t2":{"name":"电商/交易","opps":[...]},"t3":{"name":"服务/产品","opps":[...]}}',`用户：${d.goal}，技能${(d.skills||[]).join('、')}，时间${d.time}，资金${d.budget}`);
    if(s.id==='m')return await callDS('匹配打分。每个机会1-100分，选TOP3。JSON：{"top3":[{"rank":1,"name":"","score":92,"reason":"","diff":"","risk":""}]}',`画像：${JSON.stringify(S.wfSteps[0]._r)}\n机会：${JSON.stringify(S.wfSteps[1]._r)}`);
    if(s.id==='pl'){const m=S.wfSteps[2]._r;const t1=(m?.top3||[])[0]||{};return await callDS('生成30天行动清单，每3天一阶段。JSON：{"plan":[{"day":"Day 1-3","task":"","tool":"","criteria":"","hours":""}]}',`TOP1：${t1.name}。用户时间：${d.time}，资金：${d.budget}，技能：${(d.skills||[]).join('、')}`)}
    return 'ok';
  }else{
    if(s.id==='f')return await callDS('评估可行性。JSON：{"viable":true,"score":80,"demand":"","competition":"","match":"","challenges":[],"suggestions":[]}',`想法：${d.detail}，时间：${d.time}，资金：${d.budget}`);
    if(s.id==='r')return await callDS('识别风险。JSON：{"risks":[{"risk":"","severity":"高/中/低","fix":""}],"pivot":""}',`想法：${d.detail}，可行性：${JSON.stringify(S.wfSteps[0]._r)}`);
    if(s.id==='pl')return await callDS('30天计划。JSON：{"plan":[{"day":"Day 1-3","task":"","tool":"","criteria":"","hours":""}]}',`想法：${d.detail}，时间：${d.time}，资金：${d.budget}`);
    return 'ok';
  }
}

// ========================= REPORT =========================
function assemble(steps,mode){
  const d=S.obData;const now=new Date().toLocaleString('zh-CN');
  if(mode==='explore'){
    const p=steps[0]._r||{};const sc=steps[1]._r||{};const m=steps[2]._r||{};const pl=steps[3]._r||{};
    const all=[];if(sc.t1)all.push(...(sc.t1.opps||[]).map(o=>({...o,track:sc.t1.name})));if(sc.t2)all.push(...(sc.t2.opps||[]).map(o=>({...o,track:sc.t2.name})));if(sc.t3)all.push(...(sc.t3.opps||[]).map(o=>({...o,track:sc.t3.name})));
    const t3=m.top3||[];const t1=t3[0]||{};
    return{mode:'explore',goal:d.goal,date:now,profile:p,allOpps:all,top3:t3,top1:t1.name,top1Score:t1.score,plan:pl.plan||[],direction:pl.direction||t1.name,summary:`最佳切入点：${t1.name||'待定'} · 匹配度${t1.score||'—'}%`};
  }else{
    const f=steps[0]._r||{};const r=steps[1]._r||{};const pl=steps[2]._r||{};
    return{mode:'direct',goal:d.detail,date:now,feasibility:f,risks:r.risks||[],pivot:r.pivot||'',plan:pl.plan||[],direction:pl.direction||d.detail,summary:f.viable?`${d.detail} 可行性${f.score||'—'}分`:`${d.detail} 挑战较大`};
  }
}
function renderReport(data,fromHist=false){if(!fromHist)S.reportData=data;goScreen('report');let h='';h+=`<div class="r-head"><h1>🔮 ${data.mode==='explore'?'搞钱方向分析':'可行性分析'}</h1><div style="display:flex;gap:6px"><button class="btn btn-outline btn-sm" id="btnShare">📤 分享</button><button class="btn btn-outline btn-sm" id="btnNew">🔄 重新分析</button></div></div>`;if(data.mode==='explore'){const p=data.profile||{};h+=`<div class="r-card"><h2>👤 画像</h2><p><strong>定位：</strong>${p.positioning||'—'}</p><p><strong>类型：</strong>${p.archetype||'—'}</p><p><strong>优势：</strong>${(p.strengths||[]).join('、')||'—'}</p><p><strong>限制：</strong>${(p.constraints||[]).join('、')||'—'}</p></div>`;const t3=data.top3||[];if(t3.length){h+=`<div class="r-card"><h2>🏆 TOP3</h2>`;t3.forEach((t,i)=>{h+=`<h3>${['🥇','🥈','🥉'][i]} ${t.name||''}</h3><span class="badge ${t.score>=85?'badge-h':(t.score>=65?'badge-m':'')}">匹配度 ${t.score||'—'}%</span><p>${t.reason||''}</p>${t.diff?`<p><strong>你的优势：</strong>${t.diff}</p>`:''}${t.risk?`<p style="color:#f59e0b">⚠️ ${t.risk}</p>`:''}`});h+=`</div>`}const opps=data.allOpps||[];if(opps.length){h+=`<div class="r-card"><h2>🔍 市场扫描</h2>`;const tr={};opps.forEach(o=>{if(!tr[o.track])tr[o.track]=[];tr[o.track].push(o)});Object.entries(tr).forEach(([t,items])=>{h+=`<h3>${t}</h3>`;items.forEach(o=>h+=`<p style="margin-left:8px"><strong>▸ ${o.name}</strong> — ${o.desc||''}<br><span style="font-size:11px;color:#484868">💰${o.income||'—'} · 启动${o.cost||'—'}</span></p>`)});h+=`</div>`}const pl=data.plan||[];if(pl.length){h+=`<div class="r-card"><h2>📅 30天计划</h2><table class="ptbl"><tr><th>时间</th><th>任务</th><th>工具</th><th>标准</th><th>耗时</th></tr>`;pl.forEach(p=>h+=`<tr><td>${p.day||''}</td><td>${p.task||''}</td><td>${p.tool||''}</td><td>${p.criteria||''}</td><td>${p.hours||''}</td></tr>`);h+=`</table></div>`}}else{const f=data.feasibility||{};h+=`<div class="r-card"><h2>📊 可行性</h2><span class="badge ${f.viable?'badge-h':'badge-m'}">${f.viable?'✅ 可行':'⚠️ 需谨慎'} · ${f.score||'—'}分</span>${f.demand?`<p>${f.demand}</p>`:''}${f.competition?`<p>${f.competition}</p>`:''}</div>`;const risks=data.risks||[];if(risks.length){h+=`<div class="r-card"><h2>⚠️ 风险</h2>`;risks.forEach(r=>h+=`<p><strong>${r.risk}</strong> <span style="color:${r.severity==='高'?'#ef4444':'#f59e0b'}">[${r.severity}]</span><br>→ ${r.fix}</p>`);h+=`</div>`}if(data.pivot)h+=`<div class="r-card"><h2>🔄 Plan B</h2><p>${data.pivot}</p></div>`;const pl=data.plan||[];if(pl.length){h+=`<div class="r-card"><h2>📅 30天计划</h2><table class="ptbl"><tr><th>时间</th><th>任务</th><th>工具</th><th>标准</th><th>耗时</th></tr>`;pl.forEach(p=>h+=`<tr><td>${p.day||''}</td><td>${p.task||''}</td><td>${p.tool||''}</td><td>${p.criteria||''}</td><td>${p.hours||''}</td></tr>`);h+=`</table></div>`}}h+=`<div class="r-card" style="text-align:center;padding:12px"><p style="color:#484868;font-size:11px;margin:0">⚡ Zero 工作流引擎 · ${data.date||''}</p></div>`;$('reportBody').innerHTML=h;$('reportMeta').textContent=``;$('btnShare').onclick=shareReport;$('btnNew').onclick=()=>goScreen('home');const head=$('r-head');if(head&&!head.querySelector('.btn-back')){const bb=document.createElement('button');bb.className='btn btn-outline btn-sm btn-back';bb.textContent='← 返回';bb.onclick=()=>goScreen('home');head.prepend(bb)}}
async function shareReport(){if(!S.reportData)return;const t=`【Zero 搞钱分析】\n🔮 ${S.reportData.top1||S.reportData.goal||'—'}\n${S.reportData.summary||''}`;if(navigator.share){try{await navigator.share({title:'Zero搞钱分析',text:t})}catch(e){}}else{await navigator.clipboard.writeText(t);toast('📋 已复制')}}

// ========================= HISTORY =========================
function renderHistory(){const rs=getReports();if(!rs.length){$('histList').innerHTML=`<div class="empty"><div class="ei">📭</div><p>还没有报告</p></div>`;return}$('histList').innerHTML=rs.map((r,i)=>`<div class="h-item" data-i="${i}"><div class="hd">${new Date(r.date).toLocaleString('zh-CN')}</div><div class="ht">${r.mode==='explore'?`搞钱分析：${r.top1||r.goal}`:`项目分析：${r.goal}`}</div><div class="hp">${r.summary||''}</div></div>`).join('');document.querySelectorAll('.h-item').forEach(el=>el.onclick=function(){const r=rs[parseInt(this.dataset.i)];if(r){S.reportData=r;renderReport(r,true)}})}

// ========================= INIT =========================
function init(){
  load();
  $('btnExplore').onclick=()=>startOb('explore');
  $('btnDirect').onclick=()=>startOb('direct');
  $('linkHistory').onclick=()=>goScreen('history');
  $('btnGear').onclick=()=>goScreen('settings');
  $('btnSetBack').onclick=()=>goScreen('home');
  $('btnSaveSet').onclick=save;
  $('btnClearHist').onclick=()=>{if(confirm('确定删除所有历史报告？')){localStorage.removeItem('z_reports');toast('🗑 已删除')}};
  $('btnHistBack').onclick=()=>goScreen('home');
  $('goalInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();startOb('explore')}});
  // Tabs
  document.querySelectorAll('.tab').forEach(t=>t.onclick=function(){document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));this.classList.add('active');renderCases(this.dataset.tab)});
  renderCases('all');
  goScreen('home');
}
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{})})}
document.addEventListener('DOMContentLoaded',init);
</script>
