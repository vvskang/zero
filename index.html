<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#060608">
<meta name="description" content="Zero — 从零开始的一人公司。AI 工作流引擎 + 搞钱人格测试。">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zero">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%238b5cf6'/><stop offset='100%25' stop-color='%233b82f6'/></linearGradient></defs><rect width='100' height='100' rx='24' fill='%23060608'/><text x='50' y='68' text-anchor='middle' fill='url(%23g)' font-size='54' font-weight='800' font-family='system-ui'>0</text></svg>">
<title>Zero</title>
<style>
/* ============ ROOT ============ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:#060608;color:#d0d0dc;min-height:100dvh;line-height:1.6;
  overflow-x:hidden;
}
/* Ambient background */
body::before{
  content:'';position:fixed;top:-30%;left:-20%;width:140%;height:140%;
  background:radial-gradient(ellipse at 30% 20%,rgba(139,92,246,.06) 0%,transparent 60%),
              radial-gradient(ellipse at 70% 60%,rgba(59,130,246,.05) 0%,transparent 60%),
              radial-gradient(ellipse at 50% 80%,rgba(139,92,246,.04) 0%,transparent 50%);
  pointer-events:none;z-index:0;animation:ambientMove 20s ease-in-out infinite;
}
@keyframes ambientMove{0%,100%{transform:translate(0,0)}33%{transform:translate(1%,-1%)}66%{transform:translate(-1%,1%)}}

#app{position:relative;z-index:1;width:100%;max-width:520px;margin:0 auto;padding:20px 16px 60px;min-height:100dvh}

/* ============ SCREENS ============ */
.screen{display:none;flex-direction:column;flex:1}
.screen.active{display:flex}

/* ============ GLASS CARD ============ */
.glass{
  background:rgba(18,18,28,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:20px;
  transition:all .25s;
}
.glass:hover{border-color:rgba(139,92,246,.25);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.glass-sm{background:rgba(18,18,28,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.05);border-radius:16px;padding:16px;transition:all .25s}
.glass-sm:hover{border-color:rgba(139,92,246,.2)}

/* ============ BUTTONS ============ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 24px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;
  border:none;font-family:inherit;transition:all .2s;text-decoration:none;
}
.btn:active{transform:scale(.97)}
.btn-primary{
  background:linear-gradient(135deg,#7c3aed,#6366f1);color:#fff;
  box-shadow:0 4px 16px rgba(124,58,237,.25);
}
.btn-primary:hover{box-shadow:0 6px 24px rgba(124,58,237,.4);transform:translateY(-1px)}
.btn-primary:disabled{background:#2a2850;color:#606080;box-shadow:none;cursor:not-allowed;transform:none}
.btn-outline{
  background:transparent;color:#b0b0c0;border:1px solid rgba(255,255,255,.1);
}
.btn-outline:hover{border-color:rgba(139,92,246,.4);color:#d0d0e0}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:10px}
.btn-ghost{background:transparent;color:#808090;border:none;font-size:14px;cursor:pointer;font-family:inherit}
.btn-ghost:hover{color:#b0b0c0}

/* ============ HOME ============ */
.logo-wrap{text-align:center;margin:40px 0 8px}
.logo{
  font-size:80px;font-weight:900;letter-spacing:-4px;
  background:linear-gradient(135deg,#a78bfa 0%,#818cf8 40%,#60a5fa 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(139,92,246,.3));
}
.tagline{text-align:center;color:#606080;font-size:14px;margin-bottom:6px;letter-spacing:2px}
.sub-tagline{text-align:center;color:#404050;font-size:12px;margin-bottom:32px}

.section-label{
  font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#505060;
  margin:28px 0 12px;padding-left:4px;
}

.feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.feature-card{
  background:rgba(18,18,28,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.05);border-radius:18px;padding:18px 16px;
  cursor:pointer;transition:all .25s;text-align:center;position:relative;overflow:hidden;
}
.feature-card::after{
  content:'';position:absolute;top:-50%;right:-50%;width:100%;height:100%;
  background:radial-gradient(circle,rgba(139,92,246,.08) 0%,transparent 70%);
  opacity:0;transition:opacity .3s;
}
.feature-card:hover::after{opacity:1}
.feature-card:hover{border-color:rgba(139,92,246,.25);transform:translateY(-1px)}
.feature-card:active{transform:scale(.98)}
.feature-icon{font-size:36px;margin-bottom:8px;position:relative;z-index:1}
.feature-title{font-size:14px;font-weight:700;color:#c0c0d0;margin-bottom:4px;position:relative;z-index:1}
.feature-desc{font-size:11px;color:#585868;position:relative;z-index:1;line-height:1.4}

.main-cta{margin-top:4px}
.main-cta .glass{text-align:center;padding:24px 20px}
.main-cta .cta-icon{font-size:40px;margin-bottom:10px}
.main-cta .cta-title{font-size:18px;font-weight:700;color:#e0e0e8;margin-bottom:4px}
.main-cta .cta-desc{font-size:13px;color:#686880;margin-bottom:16px}
.main-cta .goal-input{
  width:100%;padding:14px 16px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);
  border-radius:14px;color:#d0d0dc;font-size:16px;outline:none;font-family:inherit;
  resize:none;transition:border .2s;
}
.main-cta .goal-input:focus{border-color:rgba(139,92,246,.5)}
.main-cta .goal-input::placeholder{color:#404050}

.home-footer{text-align:center;margin-top:8px}

/* ============ ONBOARDING ============ */
.ob-header{margin-bottom:20px;display:flex;align-items:center;gap:12px}
.ob-back{background:none;border:none;color:#707080;font-size:14px;cursor:pointer;font-family:inherit}
.ob-back:hover{color:#b0b0c0}
.ob-progress{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.ob-progress-bar{height:100%;background:linear-gradient(90deg,#7c3aed,#6366f1);border-radius:2px;transition:width .3s}
.ob-question{font-size:22px;font-weight:700;margin-bottom:8px;color:#e0e0e8;line-height:1.4}
.ob-desc{font-size:13px;color:#606080;margin-bottom:20px}
.option-list{display:flex;flex-direction:column;gap:8px}
.opt{
  padding:14px 16px;background:rgba(18,18,28,.5);border:1px solid rgba(255,255,255,.05);
  border-radius:14px;color:#b0b0c0;font-size:15px;cursor:pointer;text-align:left;
  transition:all .2s;font-family:inherit;display:flex;align-items:center;gap:10px
}
.opt:hover{border-color:rgba(139,92,246,.3);background:rgba(24,24,36,.6)}
.opt.sel{border-color:#7c3aed;background:rgba(124,58,237,.1);color:#c4b5fd}
.tag-wrap{display:flex;flex-wrap:wrap;gap:8px}
.tag{
  padding:10px 16px;background:rgba(18,18,28,.5);border:1px solid rgba(255,255,255,.05);
  border-radius:24px;color:#b0b0c0;font-size:14px;cursor:pointer;user-select:none;transition:all .2s
}
.tag:hover{border-color:rgba(139,92,246,.3)}
.tag.sel{border-color:#7c3aed;background:rgba(124,58,237,.12);color:#c4b5fd}
.ob-actions{margin-top:24px;display:flex;gap:10px}
.free-input{
  width:100%;padding:14px 16px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);
  border-radius:14px;color:#d0d0dc;font-size:16px;outline:none;font-family:inherit;resize:none
}
.free-input:focus{border-color:rgba(139,92,246,.5)}
.free-input::placeholder{color:#404050}

/* ============ WORKFLOW ============ */
.wf-title{font-size:22px;font-weight:700;text-align:center;margin:30px 0 6px}
.wf-sub{text-align:center;color:#606080;font-size:13px;margin-bottom:36px}
.pipeline{position:relative}
.pipeline::before{content:'';position:absolute;left:21px;top:28px;bottom:28px;width:1px;background:rgba(255,255,255,.06);z-index:0}
.pipe-item{display:flex;align-items:flex-start;gap:14px;padding:16px 0;position:relative;z-index:1}
.pipe-dot{
  width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:16px;font-weight:700;transition:all .4s;
  background:rgba(18,18,28,.8);border:2px solid rgba(255,255,255,.06);color:#505060;
}
.pipe-dot.run{border-color:#7c3aed;background:rgba(124,58,237,.15);color:#a78bfa;animation:dotPulse 1.2s ease-in-out infinite}
.pipe-dot.done{border-color:#10b981;background:rgba(16,185,129,.1);color:#34d399}
.pipe-dot.err{border-color:#ef4444;background:rgba(239,68,68,.1);color:#f87171}
@keyframes dotPulse{0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,.4)}50%{box-shadow:0 0 20px 6px rgba(124,58,237,.1)}}
.pipe-info{flex:1;min-width:0}
.pipe-name{font-size:14px;font-weight:600;color:#606080;transition:color .3s}
.pipe-item.run .pipe-name{color:#b0a0e0}
.pipe-item.done .pipe-name{color:#808090}
.pipe-detail{font-size:12px;color:#404050;margin-top:2px}
.pipe-sub{font-size:12px;color:#484868;margin-top:4px;overflow:hidden;max-height:0;transition:max-height .3s}
.pipe-item.run .pipe-sub{max-height:200px}
.wf-done{text-align:center;margin-top:30px;opacity:0;transform:translateY(10px);transition:all .5s}
.wf-done.show{opacity:1;transform:translateY(0)}
.wf-done-icon{font-size:52px;margin-bottom:8px}
.wf-done-text{font-size:16px;color:#9090a0;margin-bottom:16px}

/* ============ REPORT ============ */
.report-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.report-head h1{font-size:24px;font-weight:800;color:#e0e0e8}
.r-card{background:rgba(18,18,28,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.06);border-radius:18px;padding:20px;margin-bottom:14px}
.r-card h2{font-size:17px;margin-bottom:12px;color:#d0d0e0}
.r-card h3{font-size:15px;color:#b0b0c0;margin:14px 0 6px}
.r-card p{font-size:14px;color:#808090;line-height:1.7;margin-bottom:6px}
.r-card li{font-size:14px;color:#808090;margin-bottom:4px}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:8px}
.badge-hi{background:rgba(16,185,129,.12);color:#34d399}
.badge-md{background:rgba(245,158,11,.12);color:#fbbf24}
.plan-tbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.plan-tbl th{text-align:left;padding:8px 10px;color:#686880;font-weight:500;border-bottom:1px solid rgba(255,255,255,.06);font-size:12px}
.plan-tbl td{padding:8px 10px;color:#787898;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:top}
.plan-tbl tr:hover td{background:rgba(18,18,28,.4)}
.r-meta{font-size:12px;color:#404050;text-align:center;margin-top:8px}

/* ============ SHARE CARD (人格/运势/匹配) ============ */
.share-card{
  background:linear-gradient(145deg,#0c0c18 0%,#141428 40%,#0e0e1c 100%);
  border:1px solid rgba(139,92,246,.2);border-radius:24px;padding:28px 24px;
  text-align:center;position:relative;overflow:hidden;margin:16px 0;
  box-shadow:0 20px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.03);
}
.share-card::before{
  content:'';position:absolute;top:-80px;right:-80px;width:200px;height:200px;
  background:radial-gradient(circle,rgba(139,92,246,.1) 0%,transparent 70%);pointer-events:none
}
.share-card::after{
  content:'';position:absolute;bottom:-40px;left:-40px;width:160px;height:160px;
  background:radial-gradient(circle,rgba(59,130,246,.08) 0%,transparent 70%);pointer-events:none
}
.share-card>*{position:relative;z-index:1}
.share-card .sc-type{font-size:12px;letter-spacing:3px;color:#6868a0;text-transform:uppercase;margin-bottom:16px}
.share-card .sc-icon{font-size:72px;margin-bottom:12px;filter:drop-shadow(0 0 20px rgba(139,92,246,.3))}
.share-card .sc-name{font-size:28px;font-weight:900;color:#e8e0f0;margin-bottom:6px}
.share-card .sc-sub{font-size:14px;color:#7878a8;margin-bottom:16px}
.share-card .sc-traits{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:16px}
.share-card .sc-trait{padding:6px 14px;border-radius:20px;font-size:12px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.15);color:#a78bfa}
.share-card .sc-score{font-size:56px;font-weight:900;background:linear-gradient(135deg,#a78bfa,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.share-card .sc-foot{font-size:11px;color:#484868;margin-top:16px;border-top:1px solid rgba(255,255,255,.04);padding-top:12px}
.share-actions{display:flex;gap:8px;justify-content:center;margin-top:16px}

/* ============ HISTORY ============ */
.h-list{display:flex;flex-direction:column;gap:8px}
.h-item{background:rgba(18,18,28,.5);border:1px solid rgba(255,255,255,.05);border-radius:14px;padding:14px 16px;cursor:pointer;transition:all .2s}
.h-item:hover{border-color:rgba(139,92,246,.25)}
.h-item .h-date{font-size:11px;color:#505068;margin-bottom:4px}
.h-item .h-title{font-size:14px;font-weight:600;color:#b0b0c0}
.h-item .h-preview{font-size:12px;color:#606080;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{text-align:center;padding:60px 20px;color:#484858}
.empty-icon{font-size:48px;margin-bottom:12px}

/* ============ SETTINGS ============ */
.set-row{margin-bottom:20px}
.set-row label{display:block;font-size:12px;color:#606080;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.set-row input{width:100%;padding:12px 14px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.08);border-radius:12px;color:#d0d0dc;font-size:14px;outline:none;font-family:monospace}
.set-row input:focus{border-color:rgba(139,92,246,.5)}
.set-hint{font-size:11px;color:#404058;margin-top:6px;line-height:1.5}
.set-hint a{color:#7c3aed}

/* ============ TOAST ============ */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(120px);z-index:200;
  background:rgba(24,20,40,.95);border:1px solid rgba(139,92,246,.3);color:#c4b5fd;
  padding:10px 20px;border-radius:14px;font-size:14px;transition:transform .3s;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ============ SETTINGS GEAR ============ */
.gear{position:fixed;top:14px;right:14px;z-index:100;width:38px;height:38px;border-radius:12px;
  background:rgba(18,18,28,.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#606080;font-size:16px;transition:all .2s}
.gear:hover{border-color:rgba(139,92,246,.3);color:#a0a0c0}

/* ============ RESPONSIVE ============ */
@media(max-width:380px){
  .logo{font-size:62px}.feature-grid{gap:8px}.feature-card{padding:14px 10px}
  .share-card{padding:20px 16px}.sc-icon{font-size:52px}.sc-name{font-size:22px}
}
@media print{
  body{background:#fff;color:#000}
  .glass,.r-card{background:#fff;border:1px solid #ddd}
  .btn,.gear{display:none!important}
}
</style>
</head>
<body>

<div id="app">
  <!-- ====== HOME ====== -->
  <div class="screen active" id="home">
    <div class="logo-wrap"><div class="logo">ZERO</div></div>
    <div class="tagline">从 · 零 · 开 · 始</div>
    <div class="sub-tagline">AI 工作流引擎 × 搞钱方向导航</div>

    <div class="section-label">⚡ 引流功能区</div>
    <div class="feature-grid">
      <div class="feature-card" data-screen="personality">
        <div class="feature-icon">🧬</div>
        <div class="feature-title">搞钱人格档案</div>
        <div class="feature-desc">6道题测出你的搞钱人格 · 可分享</div>
      </div>
      <div class="feature-card" data-screen="fortune">
        <div class="feature-icon">🔮</div>
        <div class="feature-title">今日搞钱运势</div>
        <div class="feature-desc">每日一签 · 截图发朋友圈</div>
      </div>
      <div class="feature-card" data-screen="match">
        <div class="feature-icon">🤝</div>
        <div class="feature-title">创业合伙人匹配</div>
        <div class="feature-desc">测你和朋友的搞钱默契度</div>
      </div>
      <div class="feature-card" data-screen="history">
        <div class="feature-icon">📋</div>
        <div class="feature-title">历史报告</div>
        <div class="feature-desc">查看过往分析记录</div>
      </div>
    </div>

    <div class="section-label">🧠 核心功能</div>
    <div class="main-cta">
      <div class="glass">
        <div class="cta-icon">⚡</div>
        <div class="cta-title">AI 工作流引擎</div>
        <div class="cta-desc">不是聊天。5个 AI 节点自动协作，30秒出一份搞钱方向分析报告。</div>
        <textarea class="goal-input" id="goalInput" rows="2" placeholder="我想……（比如：搞副业、做自媒体、开网店）"></textarea>
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn btn-primary" id="btnExplore" style="flex:1">🧭 不知道方向？先测再分析</button>
          <button class="btn btn-outline" id="btnDirect" style="flex:1">🎯 已有想法？直接分析</button>
        </div>
      </div>
    </div>
    <div class="home-footer"><button class="btn-ghost" id="linkHistory">📋 历史报告 →</button></div>
  </div>

  <!-- ====== ONBOARDING ====== -->
  <div class="screen" id="onboarding"><div class="ob-header"></div><div id="obContent"></div><div class="ob-actions" id="obActions"></div></div>

  <!-- ====== WORKFLOW ====== -->
  <div class="screen" id="workflow">
    <div class="wf-title">⚙️ 工作流引擎运行中</div>
    <div class="wf-sub">正在自动分析，无需操作…</div>
    <div class="pipeline" id="pipeline"></div>
    <div class="wf-done" id="wfDone"><div class="wf-done-icon">✅</div><div class="wf-done-text">报告已生成</div><button class="btn btn-primary" id="btnViewReport">查看报告 →</button></div>
  </div>

  <!-- ====== REPORT ====== -->
  <div class="screen" id="report"><div class="report-head"></div><div id="reportBody"></div><div class="r-meta" id="reportMeta"></div></div>

  <!-- ====== PERSONALITY TEST ====== -->
  <div class="screen" id="personality"><div id="persContent"></div></div>

  <!-- ====== FORTUNE ====== -->
  <div class="screen" id="fortune"><div id="fortuneContent"></div></div>

  <!-- ====== MATCH ====== -->
  <div class="screen" id="match"><div id="matchContent"></div></div>

  <!-- ====== HISTORY ====== -->
  <div class="screen" id="history"><button class="btn btn-outline btn-sm" id="btnHistBack" style="margin-bottom:14px">← 返回</button><h2 style="font-size:20px;margin-bottom:14px">📋 历史报告</h2><div class="h-list" id="histList"></div></div>

  <!-- ====== SETTINGS ====== -->
  <div class="screen" id="settings"><button class="btn btn-outline btn-sm" id="btnSetBack" style="margin-bottom:14px">← 返回</button><h2 style="font-size:20px;margin-bottom:16px">⚙️ 设置</h2><div class="set-row"><label>DeepSeek API Key（可选）</label><input type="password" id="apiKeyInp" placeholder="不填则使用系统共享Key"><div class="set-hint">⚡ 不填也能直接用。自己的Key在 <a href="https://platform.deepseek.com" target="_blank">platform.deepseek.com</a> 获取</div></div><div class="set-row"><label>昵称</label><input type="text" id="nickInp" placeholder="你的名字"></div><button class="btn btn-primary" id="btnSaveSet">保存</button><button class="btn btn-outline" id="btnClearHist" style="margin-top:8px;color:#ef4444">🗑 清除历史</button></div>
</div>

<div class="toast" id="toast"></div>
<button class="gear" id="btnGear" title="设置">⚙</button>

<script>
// ==================== STATE ====================
const S={
  screen:'home', apiKey:'', nick:'',
  obMode:'explore', obStep:0, obData:{goal:'',skills:[],time:'',budget:'',style:'',detail:''},
  wfSteps:[], reportData:null,
  persAnswers:[], persStep:0,
  fortuneResult:null,
  matchResult:null
};
const $=id=>document.getElementById(id);
const DEFAULT_KEY='sk-5d6e743893dd479fb6c237d40767f6b1';

// ==================== PERSIST ====================
function load(){S.apiKey=localStorage.getItem('z_api')||'';S.nick=localStorage.getItem('z_nick')||'';$('apiKeyInp').value=S.apiKey;$('nickInp').value=S.nick}
function save(){S.apiKey=$('apiKeyInp').value.trim();S.nick=$('nickInp').value.trim();localStorage.setItem('z_api',S.apiKey);localStorage.setItem('z_nick',S.nick);toast('✅ 已保存');goScreen('home')}
function getReports(){try{return JSON.parse(localStorage.getItem('z_reports')||'[]')}catch(e){return[]}}
function saveReport(r){const a=getReports();a.unshift({id:Date.now(),date:new Date().toISOString(),...r});localStorage.setItem('z_reports',JSON.stringify(a))}
function getKey(){return S.apiKey||DEFAULT_KEY}

// ==================== NAV ====================
function goScreen(name){
  S.screen=name;
  ['home','onboarding','workflow','report','personality','fortune','match','history','settings'].forEach(s=>$(s).classList.remove('active'));
  $(name).classList.add('active');
  $('btnGear').style.display=(name==='settings')?'none':'flex';
  if(name==='history') renderHistory();
  if(name==='personality') startPersonality();
  if(name==='fortune') generateFortune();
  if(name==='match') initMatch();
}
function toast(m,d=2000){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),d)}

// ==================== ONBOARDING ====================
const OB_Q={explore:[
  {title:'每天能拿出多少时间？',desc:'用于搞钱的可支配时间',type:'single',key:'time',opts:[
    {l:'⏰ 碎片时间（<1小时/天）',v:'小于1小时'},{l:'⏰ 业余时间（1-3小时/天）',v:'1-3小时'},{l:'⏰ 半全职（3-6小时/天）',v:'3-6小时'},{l:'⏰ 全职投入（6小时+/天）',v:'6小时以上'}
  ]},
  {title:'你最擅长什么？',desc:'多选，挑你最拿手的',type:'multi',key:'skills',opts:[
    {l:'✍️ 写东西',v:'写作'},{l:'💬 聊天沟通',v:'沟通'},{l:'🎨 做图/视频/设计',v:'设计创作'},{l:'📊 数据分析/研究',v:'数据分析'},{l:'🔧 技术/手工',v:'技术手工'},{l:'👥 组织管理',v:'组织管理'},{l:'💰 销售/谈判',v:'销售谈判'},{l:'🔍 信息搜集',v:'信息搜集'}
  ]},
  {title:'启动资金多少？',type:'single',key:'budget',opts:[
    {l:'💵 0-500元',v:'0-500元'},{l:'💵 500-5,000元',v:'500-5000元'},{l:'💵 5,000-20,000元',v:'5000-20000元'},{l:'💵 20,000元以上',v:'20000元以上'}
  ]},
  {title:'偏好哪种搞钱方式？',type:'single',key:'style',opts:[
    {l:'📝 做内容积累',v:'内容积累'},{l:'🔄 快速交易套利',v:'交易套利'},{l:'🛠 做产品/工具卖',v:'产品变现'},{l:'🤝 技能服务/接单',v:'服务变现'}
  ]},
  {title:'有没有特别想做的领域？',desc:'可留空',type:'free',key:'detail',ph:'比如：游戏、美妆、教育、AI、跨境电商…'}
],direct:[
  {title:'说说你的想法',desc:'越具体越好',type:'free',key:'detail',ph:'比如：想做一个帮人整理旅行攻略的AI工具'},
  {title:'每天能拿出多少时间？',type:'single',key:'time',opts:[{l:'⏰ <1小时',v:'小于1小时'},{l:'⏰ 1-3小时',v:'1-3小时'},{l:'⏰ 3-6小时',v:'3-6小时'},{l:'⏰ 6小时+',v:'6小时以上'}]},
  {title:'启动预算是？',type:'single',key:'budget',opts:[{l:'💵 0-500元',v:'0-500元'},{l:'💵 500-5,000元',v:'500-5000元'},{l:'💵 5,000-20,000元',v:'5000-20000元'},{l:'💵 20,000元+',v:'20000元以上'}]}
]};

function startOb(mode){
  S.obMode=mode;S.obStep=0;S.obData={goal:'',skills:[],time:'',budget:'',style:'',detail:''};
  S.obData.goal=$('goalInput').value.trim()||'搞副业';
  goScreen('onboarding');renderOb();
}
function renderOb(){
  const qs=OB_Q[S.obMode];const total=qs.length;const q=qs[S.obStep];
  const pct=((S.obStep)/total)*100;
  $('obContent').innerHTML=`
    <div class="ob-header">
      <button class="ob-back" id="obBack">← 返回</button>
      <div class="ob-progress"><div class="ob-progress-bar" style="width:${pct}%"></div></div>
      <span style="font-size:12px;color:#484868">${S.obStep+1}/${total}</span>
    </div>
    <div class="ob-question">${q.title}</div>
    ${q.desc?`<div class="ob-desc">${q.desc}</div>`:''}
    ${q.type==='single'?`<div class="option-list">${q.opts.map(o=>`<button class="opt${S.obData[q.key]===o.v?' sel':''}" data-v="${o.v}">${o.l}</button>`).join('')}</div>`:''}
    ${q.type==='multi'?`<div class="tag-wrap">${q.opts.map(o=>`<span class="tag${(S.obData.skills||[]).includes(o.v)?' sel':''}" data-v="${o.v}">${o.l}</span>`).join('')}</div>`:''}
    ${q.type==='free'?`<textarea class="free-input" id="freeInp" rows="3" placeholder="${q.ph||''}">${S.obData.detail||''}</textarea>`:''}
  `;
  let actions='';
  if(S.obStep>0) actions+=`<button class="btn btn-outline" id="obPrev">上一步</button>`;
  if(S.obStep<total-1) actions+=`<button class="btn btn-primary" id="obNext">下一步 →</button>`;
  else actions+=`<button class="btn btn-primary" id="obGo">🚀 启动工作流</button>`;
  $('obActions').innerHTML=actions;

  const back=$('obBack');if(back)back.onclick=()=>goScreen('home');
  document.querySelectorAll('.opt').forEach(b=>b.onclick=function(){S.obData[q.key]=this.dataset.v;renderOb()});
  document.querySelectorAll('.tag').forEach(t=>t.onclick=function(){const v=this.dataset.v;if(!S.obData.skills)S.obData.skills=[];const i=S.obData.skills.indexOf(v);if(i>=0)S.obData.skills.splice(i,1);else S.obData.skills.push(v);renderOb()});
  const fi=$('freeInp');if(fi)fi.oninput=function(){S.obData.detail=this.value};
  const prev=$('obPrev');if(prev)prev.onclick=()=>{S.obStep--;renderOb()};
  const next=$('obNext');if(next)next.onclick=()=>{if(!validateStep(q))return;S.obStep++;renderOb()};
  const go=$('obGo');if(go)go.onclick=()=>{if(!validateStep(q))return;if(q.type==='free')S.obData.detail=$('freeInp')?.value?.trim()||'';startWf()};
}
function validateStep(q){
  if(q.type==='single'&&!S.obData[q.key]){toast('⚠️ 请选择一个选项');return false}
  if(q.type==='multi'&&(!S.obData.skills||S.obData.skills.length===0)){toast('⚠️ 至少选一个');return false}
  return true;
}

// ==================== WORKFLOW ====================
const WF_DEF={explore:[
  {id:'profile',name:'用户画像分析',desc:'分析你的核心优势与独特定位',detail:'从技能、时间、资金中提取关键特征…'},
  {id:'scan',name:'市场机会扫描',desc:'扫描三大赛道的低门槛机会',detail:'内容创作 · 电商交易 · 服务变现…',subs:['内容赛道分析…','电商赛道分析…','服务赛道分析…']},
  {id:'match',name:'匹配度打分',desc:'画像 × 机会交叉评估',detail:'计算匹配矩阵，筛选最优方向…'},
  {id:'plan',name:'30天行动计划',desc:'为最优方向生成每日执行清单',detail:'规划具体任务、工具和判断标准…'},
  {id:'assemble',name:'报告组装',desc:'结构化输出完整分析报告',detail:'整理所有节点结果…'}
],direct:[
  {id:'feas',name:'可行性评估',desc:'分析市场需求与资源匹配度',detail:'评估竞争格局和差异化机会…'},
  {id:'risk',name:'风险识别',desc:'识别关键风险与应对策略',detail:'扫描执行路径上的障碍…'},
  {id:'plan',name:'执行计划生成',desc:'生成30天落地清单',detail:'拆解为每日可执行任务…'},
  {id:'assemble',name:'报告组装',desc:'生成结构化报告',detail:'整理输出…'}
]};

function buildPipeline(steps){
  return steps.map(s=>`
    <div class="pipe-item" id="node-${s.id}">
      <div class="pipe-dot" id="dot-${s.id}">${steps.indexOf(s)+1}</div>
      <div class="pipe-info"><div class="pipe-name">${s.name}</div><div class="pipe-detail">${s.desc}</div><div class="pipe-sub" id="sub-${s.id}"><span>${s.detail}</span>${(s.subs||[]).map(ss=>`<span>↳ ${ss}</span>`).join('')}</div></div>
    </div>`).join('');
}

async function startWf(){
  const mode=S.obMode;const steps=WF_DEF[mode];S.wfSteps=steps;S.reportData=null;
  goScreen('workflow');$('pipeline').innerHTML=buildPipeline(steps);$('wfDone').classList.remove('show');$('btnViewReport').style.display='none';
  if(!getKey()){toast('⚠️ 未配置API Key');markStep(steps[0].id,'err');return}
  try{
    for(let i=0;i<steps.length;i++){
      const s=steps[i];markStep(s.id,'run');await sleep(500);
      s._result=await execStep(s,i,mode);markStep(s.id,'done');
    }
    S.reportData=assemble(steps,mode);saveReport(S.reportData);$('wfDone').classList.add('show');$('btnViewReport').style.display='inline-block';$('btnViewReport').onclick=()=>renderReport(S.reportData);
  }catch(e){const r=steps.find(s=>{const d=$('dot-'+s.id);return d&&d.classList.contains('run')});if(r)markStep(r.id,'err');toast('❌ '+ (e.message||'出错'))}
}
function markStep(id,st){const dot=$('dot-'+id),node=$('node-'+id);if(!dot||!node)return;dot.classList.remove('run','done','err');node.classList.remove('run','done','err');if(st==='run'){dot.classList.add('run');node.classList.add('run');dot.textContent='◉'}else if(st==='done'){dot.classList.add('done');node.classList.add('done');dot.textContent='✓'}else{dot.classList.add('err');node.classList.add('err');dot.textContent='✗'}}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// ==================== DEEPSEEK ====================
async function callDS(system,user,jsonMode=true){
  const body={model:'deepseek-chat',messages:[{role:'system',content:system},{role:'user',content:user}],temperature:.7,max_tokens:4096};
  if(jsonMode)body.response_format={type:'json_object'};
  const resp=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${getKey()}`},body:JSON.stringify(body)});
  if(!resp.ok){const e=await resp.json().catch(()=>({}));if(resp.status===401)throw new Error('Key无效');if(resp.status===402)throw new Error('余额不足');throw new Error(e.error?.message||`API ${resp.status}`)}
  const d=await resp.json();const c=d.choices[0].message.content;
  if(jsonMode){try{return JSON.parse(c)}catch(e){const m=c.match(/```(?:json)?\s*([\s\S]*?)```/);if(m)return JSON.parse(m[1]);throw new Error('格式异常')}}
  return c;
}

async function execStep(step,i,mode){
  const d=S.obData;
  if(mode==='explore'){
    if(step.id==='profile')return await callDS('你是商业分析师。分析用户画像。输出JSON：{"strengths":[],"constraints":[],"positioning":"","archetype":""}',`目标：${d.goal}\n技能：${(d.skills||[]).join('、')}\n时间：${d.time}\n资金：${d.budget}\n偏好：${d.style}\n备注：${d.detail||'无'}`);
    if(step.id==='scan')return await callDS('你是市场分析师。分析中国2025-2026适合个人的低门槛副业。三个赛道各给3个机会。JSON：{"t1":{"name":"内容/AI","opps":[{"name":"","desc":"","income":"","cost":"","why":""}]},"t2":{"name":"电商/交易","opps":[...]},"t3":{"name":"服务/产品","opps":[...]}}',`用户：${d.goal}，技能${(d.skills||[]).join('、')}，时间${d.time}，资金${d.budget}`);
    if(step.id==='match'){return await callDS('你是匹配专家。对每个机会打分（1-100），输出TOP3。JSON：{"top3":[{"rank":1,"name":"","score":92,"reason":"","diff":"","risk":""}]}',`画像：${JSON.stringify(S.wfSteps[0]._result)}\n机会：${JSON.stringify(S.wfSteps[1]._result)}`)}
    if(step.id==='plan'){const m=S.wfSteps[2]._result;const t1=(m?.top3||[])[0]||{};return await callDS('你是计划专家。生成30天行动清单。每3天一个阶段。JSON：{"plan":[{"day":"Day 1-3","task":"","tool":"","criteria":"","hours":""}]}',`TOP1：${t1.name}，理由：${t1.reason}。用户时间：${d.time}，资金：${d.budget}，技能：${(d.skills||[]).join('、')}`)}
    return 'ok';
  }else{
    if(step.id==='feas')return await callDS('评估创业想法可行性。JSON：{"viable":true,"score":80,"demand":"","competition":"","match":"","challenges":[],"suggestions":[]}',`想法：${d.detail}，时间：${d.time}，资金：${d.budget}`);
    if(step.id==='risk'){return await callDS('识别风险。JSON：{"risks":[{"risk":"","severity":"高/中/低","fix":""}],"pivot":""}',`想法：${d.detail}，可行性：${JSON.stringify(S.wfSteps[0]._result)}`)}
    if(step.id==='plan'){return await callDS('生成30天执行计划。JSON：{"plan":[{"day":"Day 1-3","task":"","tool":"","criteria":"","hours":""}]}',`想法：${d.detail}，时间：${d.time}，资金：${d.budget}`)}
    return 'ok';
  }
}

// ==================== REPORT ====================
function assemble(steps,mode){
  const d=S.obData;const now=new Date().toLocaleString('zh-CN');
  if(mode==='explore'){
    const p=steps[0]._result||{};const sc=steps[1]._result||{};const m=steps[2]._result||{};const pl=steps[3]._result||{};
    const all=[];if(sc.t1)all.push(...(sc.t1.opps||[]).map(o=>({...o,track:sc.t1.name})));if(sc.t2)all.push(...(sc.t2.opps||[]).map(o=>({...o,track:sc.t2.name})));if(sc.t3)all.push(...(sc.t3.opps||[]).map(o=>({...o,track:sc.t3.name})));
    const t3=m.top3||[];const t1=t3[0]||{};
    return{mode:'explore',goal:d.goal,date:now,profile:p,allOpps:all,top3:t3,top1:t1.name,top1Score:t1.score,plan:pl.plan||[],direction:pl.direction||t1.name,summary:`你的最佳切入点是「${t1.name||'待定'}」，匹配度${t1.score||'—'}%。`};
  }else{
    const f=steps[0]._result||{};const r=steps[1]._result||{};const pl=steps[2]._result||{};
    return{mode:'direct',goal:d.detail,date:now,feasibility:f,risks:r.risks||[],pivot:r.pivot||'',plan:pl.plan||[],direction:pl.direction||d.detail,summary:f.viable?`「${d.detail}」可行性${f.score||'—'}分`:`「${d.detail}」挑战较大`};
  }
}

function renderReport(data,fromHist=false){
  if(!fromHist)S.reportData=data;
  goScreen('report');
  let h='';
  h+=`<div class="report-head"><h1>🔮 ${data.mode==='explore'?'搞钱方向分析':'可行性分析'}</h1><div style="display:flex;gap:6px"><button class="btn btn-outline btn-sm" id="btnShare">📤 分享</button><button class="btn btn-outline btn-sm" id="btnNew">🔄 重新分析</button></div></div>`;
  if(data.mode==='explore'){
    const p=data.profile||{};
    h+=`<div class="r-card"><h2>👤 用户画像</h2><p><strong>定位：</strong>${p.positioning||'—'}</p><p><strong>类型：</strong>${p.archetype||'—'}</p><p><strong>优势：</strong>${(p.strengths||[]).join('、')||'—'}</p><p><strong>限制：</strong>${(p.constraints||[]).join('、')||'—'}</p></div>`;
    const t3=data.top3||[];
    if(t3.length){h+=`<div class="r-card"><h2>🏆 TOP3 推荐</h2>`;t3.forEach((t,i)=>{const cls=t.score>=85?'badge-hi':(t.score>=65?'badge-md':'');h+=`<h3>${['🥇','🥈','🥉'][i]} ${t.name||''}</h3><span class="badge ${cls}">匹配度 ${t.score||'—'}%</span><p>${t.reason||''}</p>${t.diff?`<p><strong>你的优势：</strong>${t.diff}</p>`:''}${t.risk?`<p style="color:#f59e0b">⚠️ ${t.risk}</p>`:''}`});h+=`</div>`;}
    const opps=data.allOpps||[];if(opps.length){h+=`<div class="r-card"><h2>🔍 市场机会全扫描</h2>`;const m={};opps.forEach(o=>{if(!m[o.track])m[o.track]=[];m[o.track].push(o)});Object.entries(m).forEach(([t,items])=>{h+=`<h3>${t}</h3>`;items.forEach(o=>h+=`<p style="margin-left:8px"><strong>▸ ${o.name}</strong> — ${o.desc||''}<br><span style="font-size:12px;color:#505068">💰${o.income||'—'} · 启动${o.cost||'—'} · ${o.why||''}</span></p>`)});h+=`</div>`;}
    const pl=data.plan||[];if(pl.length){h+=`<div class="r-card"><h2>📅 30天行动计划</h2><table class="plan-tbl"><tr><th>时间</th><th>任务</th><th>工具</th><th>标准</th><th>耗时</th></tr>`;pl.forEach(p=>h+=`<tr><td>${p.day||''}</td><td>${p.task||''}</td><td>${p.tool||''}</td><td>${p.criteria||''}</td><td>${p.hours||''}</td></tr>`);h+=`</table></div>`;}
  }else{
    const f=data.feasibility||{};h+=`<div class="r-card"><h2>📊 可行性评估</h2><span class="badge ${f.viable?'badge-hi':'badge-md'}">${f.viable?'✅ 可行':'⚠️ 需谨慎'} · ${f.score||'—'}分</span>${f.demand?`<p>${f.demand}</p>`:''}${f.competition?`<p>${f.competition}</p>`:''}${f.challenges?`<p><strong>关键挑战：</strong>${f.challenges.join('、')}</p>`:''}</div>`;
    const risks=data.risks||[];if(risks.length){h+=`<div class="r-card"><h2>⚠️ 风险</h2>`;risks.forEach(r=>h+=`<p><strong>${r.risk}</strong> <span style="color:${r.severity==='高'?'#ef4444':'#f59e0b'}">[${r.severity}]</span><br>→ ${r.fix}</p>`);h+=`</div>`;}
    if(data.pivot)h+=`<div class="r-card"><h2>🔄 Plan B</h2><p>${data.pivot}</p></div>`;
    const pl=data.plan||[];if(pl.length){h+=`<div class="r-card"><h2>📅 30天计划</h2><table class="plan-tbl"><tr><th>时间</th><th>任务</th><th>工具</th><th>标准</th><th>耗时</th></tr>`;pl.forEach(p=>h+=`<tr><td>${p.day||''}</td><td>${p.task||''}</td><td>${p.tool||''}</td><td>${p.criteria||''}</td><td>${p.hours||''}</td></tr>`);h+=`</table></div>`;}
  }
  h+=`<div class="r-card" style="text-align:center;padding:14px"><p style="color:#505068;font-size:12px;margin:0">⚡ Zero 工作流引擎自动生成 · ${data.date||''}</p></div>`;
  $('reportBody').innerHTML=h;$('reportMeta').textContent=``;
  $('btnShare').onclick=shareReport;$('btnNew').onclick=()=>goScreen('home');
  // Back button
  const head=$('reportHead');if(head&&!head.querySelector('.btn-back')){const bb=document.createElement('button');bb.className='btn btn-outline btn-sm btn-back';bb.textContent='← 返回';bb.onclick=()=>goScreen('home');head.prepend(bb)}
}
async function shareReport(){
  if(!S.reportData)return;
  const t=`【Zero 搞钱分析】\n🔮 ${S.reportData.top1||S.reportData.goal||'—'}\n${S.reportData.summary||''}`;
  if(navigator.share){try{await navigator.share({title:'Zero搞钱分析',text:t})}catch(e){}}
  else{await navigator.clipboard.writeText(t);toast('📋 已复制，去分享吧')}
}

// ==================== HISTORY ====================
function renderHistory(){
  const reports=getReports();
  if(!reports.length){$('histList').innerHTML=`<div class="empty"><div class="empty-icon">📭</div><p>还没有报告</p></div>`;return}
  $('histList').innerHTML=reports.map((r,i)=>`<div class="h-item" data-i="${i}"><div class="h-date">${new Date(r.date).toLocaleString('zh-CN')}</div><div class="h-title">${r.mode==='explore'?`搞钱分析：${r.top1||r.goal}`:`项目分析：${r.goal}`}</div><div class="h-preview">${r.summary||''}</div></div>`).join('');
  document.querySelectorAll('.h-item').forEach(el=>el.onclick=function(){const r=reports[parseInt(this.dataset.i)];if(r){S.reportData=r;renderReport(r,true)}});
}

function startPersonality(){S.persAnswers=[];S.persStep=0;renderPers();}
function renderPers(){
  if(S.persStep>=PERS_Q.length){showPersResult();return}
  const q=PERS_Q[S.persStep];
  $('persContent').innerHTML=`
    <button class="btn btn-outline btn-sm" id="persBack" style="margin-bottom:16px">← 返回首页</button>
    <div style="margin-bottom:8px;font-size:12px;color:#505068">搞钱人格档案 · ${S.persStep+1}/${PERS_Q.length}</div>
    <div class="ob-progress" style="margin-bottom:20px"><div class="ob-progress-bar" style="width:${(S.persStep/PERS_Q.length)*100}%"></div></div>
    <div class="ob-question">${q.q}</div>
    <div class="option-list" style="margin-top:20px">${q.o.map((o,i)=>`<button class="opt" data-idx="${i}">${o}</button>`).join('')}</div>
  `;
  $('persBack').onclick=()=>goScreen('home');
  document.querySelectorAll('.opt').forEach(b=>b.onclick=function(){S.persAnswers.push(parseInt(this.dataset.idx));S.persStep++;renderPers()});
}
function showPersResult(){
  const types=['🦅','🌐','⚡','🧙','🎯','🌊'];
  const scores=Array(types.length).fill(0);
  // Quick scoring: each answer maps to a type with some randomness
  const map=[[0,2,5],[1,3],[2,5],[0,3,4],[0,1,2,5],[0,4]];
  S.persAnswers.forEach((a,i)=>{const t=map[i]||[];t.forEach(j=>scores[j]+=1.5)});
  // Add tiny fuzz
  scores.forEach((_,i)=>scores[i]+=Math.random()*.8);
  let maxI=0;scores.forEach((s,i)=>{if(s>scores[maxI])maxI=i});
  const type=types[maxI];const p=PERSONAS[type];
  const cardId='persCard';
  $('persContent').innerHTML=`
    <button class="btn btn-outline btn-sm" style="margin-bottom:12px" onclick="goScreen('home')">← 返回首页</button>
    <div class="share-card" id="${cardId}">
      <div class="sc-type">ZERO · 搞钱人格档案</div>
      <div class="sc-icon">${type}</div>
      <div class="sc-name">${p.name}</div>
      <div class="sc-sub">${p.sub}</div>
      <div class="sc-traits">${p.traits.map(t=>`<span class="sc-trait">${t}</span>`).join('')}</div>
      <p style="color:#808098;font-size:14px;line-height:1.7;margin:12px 0">${p.desc}</p>
      <p style="color:#606080;font-size:13px"><strong>最适合你的方向：</strong>${p.best}</p>
      <div class="sc-foot">⚡ 由 Zero 生成 · vvskang.github.io/zero</div>
    </div>
    <div class="share-actions">
      <button class="btn btn-primary" id="persShare">📤 分享到朋友圈</button>
      <button class="btn btn-outline" id="persRetry">🔄 重新测试</button>
    </div>
  `;
  $('persShare').onclick=()=>{const txt=`【我的搞钱人格】${p.name} — ${p.sub}\n${p.traits.join(' · ')}\n最适合：${p.best}\n\n测测你的→ vvskang.github.io/zero\n#搞钱人格测试 #Zero`;if(navigator.share){navigator.share({title:`我的搞钱人格：${p.name}`,text:txt}).catch(()=>{})}else{navigator.clipboard.writeText(txt);toast('📋 已复制，去粘贴分享吧')}};

function initMatch(){S.matchResult=null;$('matchContent').innerHTML=`
  <button class="btn btn-outline btn-sm" style="margin-bottom:20px" onclick="goScreen('home')">← 返回首页</button>
  <div style="text-align:center;margin-bottom:8px"><span style="font-size:56px">🤝</span></div>
  <div class="ob-question" style="text-align:center">创业合伙人匹配度</div>
  <div class="ob-desc" style="text-align:center">输入你和朋友的名字，测你们的搞钱默契</div>

  <button class="btn btn-primary" id="matchGo" style="width:100%">🔮 测试匹配度</button>
  <div id="matchResult"></div>
`;
$('matchGo').onclick=()=>{
  const n1=$('matchName1').value.trim()||'你';const n2=$('matchName2').value.trim();
  if(!n2){toast('⚠️ 请输入朋友的名字');return}
  const seed=(n1+n2).split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const score=Math.abs((seed*13+7)%85)+15;
  const levels=score>=85?['🔥 天作之合','你们简直是搞钱界的双子星！一个想一个做，配合默契到可怕。','建议立刻合伙开公司。一个负责创意，一个负责执行。','对方是你搞钱路上最重要的那个人。']:score>=70?['✨ 黄金搭档','你们有很好的互补性。但需要明确分工——谁管钱，谁管活。','可以先做一个小项目试试。信任建立起来就是无敌组合。','对方是你值得长期合作的伙伴。']:score>=55?['🤔 需要磨合','有潜力但沟通方式需要磨合。你们看问题的角度不同，这既是优势也是隐患。','可以从一个短期项目开始，测试一下配合。别一上来就签长期协议。','对方能给你带来新视角，但需要包容差异。']:['🌊 保持独立','你们可能更适合做朋友而不是合伙人。风格差异较大，合作容易产生摩擦。','如果一定要合作，把规则写清楚——利益分配、决策机制、退出条款。','朋友不一定适合一起搞钱，这很正常。'];
  const l=levels;
  const cardId='matchCard';
  $('matchResult').innerHTML=`
    <div class="share-card" id="${cardId}" style="margin-top:20px">
      <div class="sc-type">ZERO · 创业合伙人匹配</div>
      <div style="font-size:18px;color:#9090a8;margin-bottom:8px">${n1} × ${n2}</div>
      <div class="sc-score">${score}%</div>
      <div class="sc-name" style="font-size:22px">${l[0]}</div>
      <p style="color:#9090a8;font-size:14px;line-height:1.8;margin:12px 0">${l[1]}<br><br>💡 ${l[2]}<br><br>📝 ${l[3]}</p>
      <div class="sc-foot">⚡ Zero 生成 · 测测你和朋友的默契 → vvskang.github.io/zero</div>
    </div>
    <div class="share-actions">
      <button class="btn btn-primary" id="matchShare">📤 分享结果</button>
      <button class="btn btn-outline" id="matchRetry">🔄 再测一组</button>
    </div>
  `;
  $('matchShare').onclick=()=>{const txt=`【${n1} × ${n2} 创业匹配度】${score}% · ${l[0]}\n${l[1]}\n\n测测你和朋友的搞钱默契 → vvskang.github.io/zero`;if(navigator.share){navigator.share({title:`${n1}×${n2} 匹配度${score}%`,text:txt}).catch(()=>{})}else{navigator.clipboard.writeText(txt);toast('📋 已复制')}};
  $('matchRetry').onclick=initMatch;
};

// ==================== INIT ====================
function init(){
  load();
  $('btnExplore').onclick=()=>startOb('explore');
  $('btnDirect').onclick=()=>startOb('direct');
  $('linkHistory').onclick=()=>goScreen('history');
  $('btnGear').onclick=()=>goScreen('settings');
  $('btnSetBack').onclick=()=>goScreen('home');
  $('btnSaveSet').onclick=save;
  $('btnClearHist').onclick=()=>{if(confirm('确定删除所有历史报告？')){localStorage.removeItem('z_reports');toast('🗑 已删除')}};
  $('btnHistBack').onclick=()=>goScreen('home');
  $('goalInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();startOb('explore')}});
  document.querySelectorAll('.feature-card').forEach(c=>c.onclick=function(){goScreen(this.dataset.screen)});
  goScreen('home');
}
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{})})}
document.addEventListener('DOMContentLoaded',init);
</script>
