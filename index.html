<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0b0f16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="了">
<meta name="description" content="了 — 每天睡前，放下今天。情绪星河 · 晚安来信。">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230b0f16'/><text x='50' y='74' text-anchor='middle' fill='%23c9a96e' font-size='64' font-weight='300' font-family='system-ui'>了</text></svg>">
<title>了</title>
<style>
/* ============ ROOT ============ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:#0b0f16;color:#d4cec4;min-height:100dvh;overflow-x:hidden;
  user-select:none;-webkit-user-select:none;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 400px 500px at 50% 25%,rgba(201,169,110,.025) 0%,transparent 60%),
              radial-gradient(ellipse 200px 200px at 80% 60%,rgba(180,160,130,.015) 0%,transparent 50%);
}

#app{position:relative;z-index:1;width:100%;max-width:440px;margin:0 auto;min-height:100dvh;padding-bottom:90px}

/* ============ SCREENS ============ */
.page{display:none;flex-direction:column;align-items:center;padding:44px 24px 20px}
.page.on{display:flex}

/* ============ PAGE 1: RITUAL (放下) ============ */
.moon{font-size:38px;margin-bottom:24px;opacity:.7;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.greeting{font-size:14px;color:#6b6358;margin-bottom:16px;letter-spacing:1px}
.question{font-size:22px;color:#c4bcae;font-weight:300;text-align:center;line-height:1.5;margin-bottom:22px}
.tags{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:26px}
.tag{padding:10px 20px;border-radius:24px;font-size:14px;cursor:pointer;transition:all .25s;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.04);color:#8b8278}
.tag:hover{background:rgba(255,255,255,.04)}
.tag.pick{border-color:rgba(201,169,110,.3);background:rgba(201,169,110,.06);color:#c9a96e}
.text-toggle{font-size:12px;color:#4a443c;cursor:pointer;margin-bottom:26px;transition:color .2s}
.text-toggle:hover{color:#6b6358}
.text-area{width:100%;max-width:300px;padding:14px 16px;background:rgba(255,255,255,.012);border:1px solid rgba(255,255,255,.03);border-radius:14px;color:#9b9388;font-size:15px;outline:none;font-family:inherit;resize:none;text-align:center;line-height:1.7;transition:all .3s;height:0;opacity:0;overflow:hidden;margin-bottom:10px}
.text-area.show{height:80px;opacity:1;margin-bottom:26px}
.text-area:focus{border-color:rgba(201,169,110,.15)}
.text-area::placeholder{color:#4a443c}
.btn-letgo{width:80px;height:80px;border-radius:50%;border:1px solid rgba(201,169,110,.2);background:rgba(201,169,110,.04);color:#c9a96e;font-size:18px;cursor:pointer;transition:all .3s;font-family:inherit;display:flex;align-items:center;justify-content:center}
.btn-letgo:hover{background:rgba(201,169,110,.1);border-color:rgba(201,169,110,.35);box-shadow:0 0 32px rgba(201,169,110,.06)}
.btn-letgo:active{transform:scale(.94)}
.tonight-hint{font-size:11px;color:#3a3430;margin-top:20px;text-align:center;line-height:1.6}

/* ============ CEREMONY OVERLAY ============ */
.overlay{position:fixed;inset:0;z-index:100;background:#0b0f16;display:none;flex-direction:column;align-items:center;justify-content:center}
.overlay.on{display:flex}
.ceremony-moon{font-size:32px;margin-bottom:40px;opacity:.5;animation:float 3s ease-in-out infinite}
.scene{position:relative;width:260px;height:200px;margin-bottom:40px}
.water{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(to bottom,transparent,rgba(32,36,48,.6),rgba(24,28,40,.8));border-radius:0 0 40% 60%;animation:rip 3s ease-in-out infinite}
.water::after{content:'';position:absolute;top:-20px;left:10%;right:10%;height:2px;background:rgba(201,169,110,.06);border-radius:50%}
@keyframes rip{0%,100%{border-radius:0 0 40% 60%}50%{border-radius:0 0 60% 40%}}
.boat{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);font-size:36px;transition:all 4s cubic-bezier(.4,0,.2,1);z-index:2}
.boat.sail{bottom:280px;opacity:0;transform:translateX(-50%) rotate(-5deg) scale(.6)}
.boat-text{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);font-size:12px;color:#8b8278;text-align:center;max-width:200px;transition:all 4s cubic-bezier(.4,0,.2,1);z-index:1;line-height:1.6}
.boat-text.sail{bottom:320px;opacity:0}
.dots{position:absolute;inset:0;pointer-events:none}
.dot{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(201,169,110,.35);animation:drift 4s ease-out forwards;opacity:0}
@keyframes drift{0%{opacity:0;transform:translateY(0)}20%{opacity:.7}100%{opacity:0;transform:translateY(-120px)}}
.gn-wrap{display:none;flex-direction:column;align-items:center;text-align:center}
.gn-wrap.on{display:flex}
.gn1{font-size:18px;color:#9b9388;margin-bottom:8px;font-weight:300}
.gn2{font-size:28px;color:#c9a96e;font-weight:300;letter-spacing:2px;margin-bottom:40px}
.gn-moon{font-size:60px;opacity:.3;animation:float 5s ease-in-out infinite}

/* ============ PAGE 2: RIVER (星河) ============ */
.river-header{text-align:center;margin-bottom:24px}
.river-title{font-size:18px;color:#b4aca0;font-weight:300;margin-bottom:4px}
.river-sub{font-size:12px;color:#5b5448}
.river-canvas{width:100%;max-width:360px;min-height:300px;border-radius:20px;background:rgba(255,255,255,.01);border:1px solid rgba(255,255,255,.02);position:relative;overflow:hidden;margin-bottom:16px}
.river-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#3a3430;font-size:13px;text-align:center;line-height:1.8}
.star{position:absolute;border-radius:50%;transition:all .3s;cursor:default}
.star:hover{transform:scale(2);z-index:10;box-shadow:0 0 20px currentColor}
.star-tip{display:none;position:absolute;bottom:120%;left:50%;transform:translateX(-50%);font-size:10px;color:#8b8278;white-space:nowrap;background:rgba(16,18,28,.9);padding:4px 10px;border-radius:8px;pointer-events:none}
.star:hover .star-tip{display:block}
.river-legend{display:flex;gap:16px;justify-content:center;font-size:11px;color:#4a443c;flex-wrap:wrap}
.river-legend span{display:flex;align-items:center;gap:4px}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* ============ PAGE 3: LETTER (来信) ============ */
.letter-card{width:100%;max-width:340px;background:rgba(255,255,255,.012);border:1px solid rgba(255,255,255,.03);border-radius:20px;padding:28px 24px;line-height:2;margin-bottom:20px}
.letter-header{text-align:center;margin-bottom:18px}
.letter-date{font-size:12px;color:#5b5448;margin-bottom:4px}
.letter-to{font-size:16px;color:#c4bcae;font-weight:300}
.letter-body{font-size:14px;color:#8b8278;line-height:2.2}
.letter-body .em{color:#c9a96e}
.letter-sign{text-align:right;margin-top:18px;font-size:13px;color:#5b5448}
.letter-empty{text-align:center;color:#4a443c;padding:40px 20px;line-height:2;font-size:14px}

/* ============ BOTTOM NAV ============ */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:50;width:100%;max-width:440px;display:flex;justify-content:space-around;padding:12px 20px max(12px,env(safe-area-inset-bottom));background:rgba(11,15,22,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.03)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:all .2s;color:#4a443c;font-size:10px;letter-spacing:.5px;background:none;border:none;font-family:inherit;padding:4px 12px;border-radius:10px}
.nav-item .ni{font-size:22px}
.nav-item.active{color:#c9a96e}
.nav-item:hover{color:#8b8278}
.nav-item:active{transform:scale(.92)}

/* ============ SETTINGS ============ */
.set-wrap{width:100%;max-width:300px;display:flex;flex-direction:column;gap:12px}
.si{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.02)}
.sl{font-size:14px;color:#8b8278}
.sv{font-size:13px;color:#5b5448}
.set-hint{font-size:11px;color:#3a3430;text-align:center;line-height:1.8;margin-top:8px}
.s-btn{padding:10px 20px;border-radius:18px;font-size:13px;cursor:pointer;font-family:inherit;background:rgba(201,169,110,.05);border:1px solid rgba(201,169,110,.12);color:#b4a080;transition:all .2s;text-align:center}
.s-btn:hover{background:rgba(201,169,110,.1)}
.s-btn:active{transform:scale(.95)}
.s-btn.danger{color:#9b7060;border-color:rgba(180,120,100,.1);background:rgba(180,120,100,.03)}

/* Toast */
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(120px);z-index:200;background:rgba(20,18,26,.95);border:1px solid rgba(201,169,110,.1);color:#9b9080;padding:10px 20px;border-radius:12px;font-size:13px;transition:transform .35s;pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}

@media(max-width:360px){.question{font-size:19px}.tags{gap:8px}.tag{padding:8px 14px;font-size:13px}}
</style>
</head>
<body>

<div id="app">
  <!-- ===== RITUAL PAGE ===== -->
  <div class="page on" id="pageRitual">
    <div class="moon">🌙</div>
    <div class="greeting" id="greeting"></div>
    <div class="question">今天有什么<br>放不下的？</div>
    <div class="tags" id="emotionTags">
      <span class="tag" data-e="焦虑">焦虑</span>
      <span class="tag" data-e="遗憾">遗憾</span>
      <span class="tag" data-e="期待">期待</span>
      <span class="tag" data-e="生气">生气</span>
      <span class="tag" data-e="说不清">说不清</span>
    </div>
    <div class="text-toggle" id="textToggle">⋯ 想说几句？</div>
    <textarea class="text-area" id="textArea" rows="2" placeholder="可以说，也可以不说。"></textarea>
    <button class="btn-letgo" id="btnLetGo">放下</button>
    <div class="tonight-hint" id="tonightHint"></div>
  </div>

  <!-- ===== RIVER PAGE ===== -->
  <div class="page" id="pageRiver">
    <div class="river-header"><div class="river-title">情绪星河</div><div class="river-sub" id="riverSub"></div></div>
    <div class="river-canvas" id="riverCanvas"><div class="river-empty" id="riverEmpty">还没有星星。<br>每天来一次，<br>这里会是一片星空。</div></div>
    <div class="river-legend">
      <span><span class="legend-dot" style="background:#c9a96e"></span>焦虑</span>
      <span><span class="legend-dot" style="background:#8b9dc3"></span>遗憾</span>
      <span><span class="legend-dot" style="background:#a8c97e"></span>期待</span>
      <span><span class="legend-dot" style="background:#c97e7e"></span>生气</span>
      <span><span class="legend-dot" style="background:#b8a0c8"></span>说不清</span>
    </div>
  </div>

  <!-- ===== LETTER PAGE ===== -->
  <div class="page" id="pageLetter">
    <div class="letter-card" id="letterCard"><div class="letter-empty">一周后<br>你会收到第一封来信。<br><br>它会告诉你：<br>这些天你放下了什么，<br>什么情绪最常来找你，<br>以及——<br>你已经做得很好了。</div></div>
  </div>

  <!-- ===== SETTINGS PAGE ===== -->
  <div class="page" id="pageSettings">
    <div class="set-wrap">
      <div class="si"><span class="sl">记录天数</span><span class="sv" id="sDays">0 天</span></div>
      <div class="si"><span class="sl">放下次数</span><span class="sv" id="sCount">0 次</span></div>
      <div class="si"><span class="sl">最常放下的</span><span class="sv" id="sTop">—</span></div>
      <button class="s-btn" id="btnLetterNow" style="width:100%;margin-top:6px">💌 现在就生成一封来信</button>
      <button class="s-btn danger" id="btnClear" style="width:100%">清空所有记录</button>
      <div class="set-hint">你的每一句话都存在本机。<br>没有人能看到。<br>包括你自己——除非你来这里。</div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="nav" id="bottomNav">
  <button class="nav-item active" data-page="pageRitual"><span class="ni">🌙</span>放下</button>
  <button class="nav-item" data-page="pageRiver"><span class="ni">🌌</span>星河</button>
  <button class="nav-item" data-page="pageLetter"><span class="ni">💌</span>来信</button>
  <button class="nav-item" data-page="pageSettings"><span class="ni">⚙</span>设置</button>
</div>

<!-- CEREMONY OVERLAY -->
<div class="overlay" id="ceremony">
  <div class="ceremony-moon">🌙</div>
  <div class="scene"><div class="dots" id="particles"></div><div class="boat-text" id="boatText"></div><div class="boat" id="boat">⛵</div><div class="water"></div></div>
</div>
<div class="overlay" id="goodnightScr">
  <div class="gn-wrap on"><div class="gn1">今天结束了</div><div class="gn2">晚安</div><div class="gn-moon">🌙</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== STATE ====================
let EM='',TX='',currPage='pageRitual';
function H(){try{return JSON.parse(localStorage.getItem('le_h')||'[]')}catch(e){return[]}}
function save(e,t){const h=H();h.push({d:new Date().toISOString(),e,t});if(h.length>600)h.splice(0,h.length-600);localStorage.setItem('le_h',JSON.stringify(h))}
function cnt(){return H().length}
function days(){return new Set(H().map(x=>x.d.slice(0,10))).size}
function topE(){const c={};H().forEach(x=>{c[x.e]=(c[x.e]||0)+1});const e=Object.entries(c).sort((a,b)=>b[1]-a[1])[0];return e?e[0]:'—'}
function clearH(){localStorage.removeItem('le_h')}
const $=id=>document.getElementById(id);
const EC={焦虑:'#c9a96e',遗憾:'#8b9dc3',期待:'#a8c97e',生气:'#c97e7e',说不清:'#b8a0c8'};

// ==================== NAVIGATION ====================
function goPage(name){
  currPage=name;
  ['pageRitual','pageRiver','pageLetter','pageSettings'].forEach(p=>$(p).classList.remove('on'));
  $(name).classList.add('on');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelector(`[data-page="${name}"]`).classList.add('active');
  if(name==='pageRitual'){resetRitual();setGreeting();setTonight()}
  if(name==='pageRiver')renderRiver();
  if(name==='pageLetter')renderLetter();
  if(name==='pageSettings')updateSettings();
}
document.querySelectorAll('.nav-item').forEach(n=>n.addEventListener('click',()=>goPage(n.dataset.page)));

// ==================== GREETING ====================
function setGreeting(){const h=new Date().getHours();const g=$('greeting');if(h>=5&&h<12)g.textContent='早上好';else if(h>=12&&h<17)g.textContent='下午好';else if(h>=17&&h<21)g.textContent='傍晚好';else g.textContent='夜深了'}
function setTonight(){const h=new Date().getHours();const n=Math.floor(Math.random()*8000+3000);if(h>=22||h<4)$('tonightHint').innerHTML=`🕯 今夜，还有 <span style="color:#c9a96e">${n.toLocaleString()}</span> 个人也醒着`;else $('tonightHint').textContent=''}

// ==================== RITUAL ====================
function resetRitual(){EM='';TX='';$('textArea').value='';$('textArea').classList.remove('show');document.querySelectorAll('.tag').forEach(t=>t.classList.remove('pick'));$('btnLetGo').style.opacity='.3';$('btnLetGo').disabled=true;$('textToggle').textContent='⋯ 想说几句？'}
document.querySelectorAll('.tag').forEach(t=>t.addEventListener('click',function(){document.querySelectorAll('.tag').forEach(x=>x.classList.remove('pick'));this.classList.add('pick');EM=this.dataset.e;$('btnLetGo').style.opacity='1';$('btnLetGo').disabled=false}));
$('textToggle').addEventListener('click',function(){const ta=$('textArea');if(ta.classList.contains('show')){ta.classList.remove('show');this.textContent='⋯ 想说几句？'}else{ta.classList.add('show');this.textContent='不用了';setTimeout(()=>ta.focus(),300)}});
$('textArea').addEventListener('input',function(){TX=this.value.trim()});

$('btnLetGo').addEventListener('click',async function(){
  if(!EM)return;TX=$('textArea').value.trim();save(EM,TX);
  $('pageRitual').classList.remove('on');const c=$('ceremony');c.classList.add('on');
  const txt=TX||EM;$('boatText').textContent=txt.length>30?txt.slice(0,30)+'…':txt;
  const pc=$('particles');pc.innerHTML='';for(let i=0;i<30;i++){const d=document.createElement('div');d.className='dot';d.style.left=(20+Math.random()*60)+'%';d.style.bottom=(Math.random()*30)+'%';d.style.animationDelay=(Math.random()*2)+'s';d.style.animationDuration=(3+Math.random()*3)+'s';pc.appendChild(d)}
  await sleep(1200);$('boat').classList.add('sail');$('boatText').classList.add('sail');
  await sleep(4500);c.classList.remove('on');const g=$('goodnightScr');g.classList.add('on');
  await sleep(4000);g.classList.remove('on');$('pageRitual').classList.add('on');resetRitual();setGreeting();setTonight();
});
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// ==================== RIVER (星河) ====================
function renderRiver(){
  const h=H();const sub=$('riverSub');const empty=$('riverEmpty');const canvas=$('riverCanvas');
  if(!h.length){empty.style.display='flex';sub.textContent='';canvas.querySelectorAll('.star').forEach(s=>s.remove());return}
  empty.style.display='none';sub.textContent=`${days()} 个夜晚 · ${h.length} 颗星星`;
  // Build stars
  canvas.querySelectorAll('.star').forEach(s=>s.remove());
  const total=h.length;const maxPerRow=12;const rows=Math.ceil(total/maxPerRow);
  const cw=canvas.clientWidth||360;const rh=Math.max(300,rows*28+40);
  canvas.style.minHeight=rh+'px';
  h.forEach((x,i)=>{
    const row=Math.floor(i/maxPerRow);const col=i%maxPerRow;
    const sx=((col+1)/(maxPerRow+1))*cw;
    const sy=row*28+24;
    const star=document.createElement('div');star.className='star';
    star.style.left=sx+'px';star.style.top=sy+'px';
    star.style.width='6px';star.style.height='6px';
    star.style.background=EC[x.e]||'#c9a96e';
    star.style.boxShadow=`0 0 6px ${EC[x.e]||'#c9a96e'}`;
    star.title=`${new Date(x.d).toLocaleDateString('zh-CN')} · ${x.e}${x.t?' — '+x.t.slice(0,15):''}`;
    // Tip
    const tip=document.createElement('div');tip.className='star-tip';
    tip.textContent=`${new Date(x.d).getMonth()+1}/${new Date(x.d).getDate()} · ${x.e}`;
    star.appendChild(tip);
    canvas.appendChild(star);
  });
  canvas.scrollTop=canvas.scrollHeight;
}

// ==================== LETTER (来信) ====================
function renderLetter(force=false){
  const h=H();const card=$('letterCard');
  if(!h.length&&!force){card.innerHTML='<div class="letter-empty">一周后<br>你会收到第一封来信。<br><br>它会告诉你：<br>这些天你放下了什么，<br>什么情绪最常来找你，<br>以及——<br>你已经做得很好了。</div>';return}
  if(!h.length)return;
  // Last 7 days
  const now7=new Date(Date.now()-7*86400000);const recent=h.filter(x=>new Date(x.d)>now7);
  const total=h.length;const d=days();
  const ec={};h.forEach(x=>{ec[x.e]=(ec[x.e]||0)+1});const t=Object.entries(ec).sort((a,b)=>b[1]-a[1])[0];
  const weekE={};recent.forEach(x=>{weekE[x.e]=(weekE[x.e]||0)+1});const wt=Object.entries(weekE).sort((a,b)=>b[1]-a[1])[0];
  // Find longest text
  let long=null;h.forEach(x=>{if((x.t||'').length>(long?.t?.length||0))long=x});
  // Poetic phrases
  const phrases={焦虑:['像风一样来了又走','今天，你又独自面对了它','它很轻，但你知道它来过'],遗憾:['有些事像沙子，握不住','轻舟已过万重山','放在心里就好'],期待:['对未来温柔的人，不会失眠','明天会因为你而不同','你已经走在路上了'],生气:['火苗亮了又灭','那些情绪，不必道歉','你是对的。但放下是对的'],说不清:['有些情绪不需要名字','它来了。你在。它走了。','就这样吧']};
  const ph=phrases[wt?wt[0]:'说不清']||phrases['说不清'];
  const now=new Date();
  card.innerHTML=`
    <div class="letter-header"><div class="letter-date">${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 · 第${total}次放下</div><div class="letter-to">亲爱的你，</div></div>
    <div class="letter-body">
      这一周，你来了 <span class="em">${recent.length}</span> 次。<br><br>
      ${wt?`最近常来找你的，是<span class="em">「${wt[0]}」</span>。<br>${ph[total%ph.length]}。<br><br>`:''}
      ${long?.t?`你写过最长的一句话：<br><span class="em">「${long.t.slice(0,40)}${long.t.length>40?'…':''}」</span><br><br>`:''}
      从第一天到现在，<br>你已经走过了 <span class="em">${d}</span> 个夜晚。<br>
      最多的陪伴是 <span class="em">「${t?t[0]:'—'}」</span>。<br><br>
      你知道吗。<br>每一次你打开这个App，<br>都在做同一件事：<br><span class="em">给自己一个句号。</span><br><br>
      你已经做得很好了。
    </div>
    <div class="letter-sign">—— 了</div>
  `;
}

// ==================== SETTINGS ====================
function updateSettings(){$('sDays').textContent=days()+' 天';$('sCount').textContent=cnt()+' 次';$('sTop').textContent=topE()}
$('btnClear').addEventListener('click',()=>{if(confirm('清空所有记录？不可撤销。')){clearH();updateSettings();toast('已清空')}});
$('btnLetterNow').addEventListener('click',()=>{renderLetter(true);goPage('pageLetter');toast('💌 你的来信')});

// ==================== TOAST ====================
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('on'),2000)}

// ==================== INIT ====================
function init(){setGreeting();setTonight();resetRitual();goPage('pageRitual')}
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{})})}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
