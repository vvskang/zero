<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#1a2538">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="关门">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a2538'/><text x='50' y='55' text-anchor='middle' fill='white' font-size='30' font-weight='700' font-family='system-ui'>关门</text><text x='50' y='78' text-anchor='middle' fill='%2388a0c0' font-size='16'>日结</text></svg>">
<title>关门 · 每日对账</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#eef1f5;color:#1a2538;min-height:100dvh}
#app{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}

/* Top bar */
.topbar{background:#1a2538;color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:18px;font-weight:700;letter-spacing:1px}
.topbar .date{font-size:12px;color:#8898b0}

/* Dashboard */
.dash{padding:16px 14px 100px;flex:1;overflow-y:auto}

/* Cards */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.c-card{background:#fff;border-radius:14px;padding:18px 16px;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.c-card .val{font-size:30px;font-weight:800;color:#1a2538;margin-bottom:2px}
.c-card .lbl{font-size:12px;color:#8898b0}
.c-card .trend{font-size:11px;margin-top:4px}
.c-card .trend.up{color:#2e8b57}
.c-card .trend.down{color:#c05050}

/* Chart section */
.sec-head{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sec-head::before{content:'';width:3px;height:16px;border-radius:2px;background:#3b5f9e}
.sec-head h2{font-size:14px;font-weight:700;color:#3a4a5a}
.chart-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.chart-box{background:#fff;border-radius:14px;padding:18px 14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.chart-box h3{font-size:13px;font-weight:700;color:#3a4a5a;margin-bottom:12px}
.chart-box canvas{width:120px;height:120px}
.legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.legend span{font-size:11px;color:#5a6a7a;display:flex;align-items:center;gap:4px}
.legend span i{width:8px;height:8px;border-radius:2px;display:inline-block}

/* Quick actions */
.quick{display:flex;gap:10px;margin-bottom:18px}
.quick button{flex:1;padding:14px 6px;background:#fff;border:none;border-radius:12px;font-size:13px;font-weight:600;color:#3a4a5a;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.04);font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:6px}
.quick button:active{transform:scale(.96);background:#f0f2f5}
.quick .qicon{font-size:22px}

/* Week table */
.week-table{width:100%;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.week-table .wrow{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #f0f2f5}
.week-table .wrow:last-child{border-bottom:none}
.week-table .wdate{font-size:13px;color:#3a4a5a;font-weight:500}
.week-table .wsub{font-size:11px;color:#8898b0}
.week-table .wval{font-size:16px;font-weight:700}
.week-table .wval.up{color:#2e8b57}
.week-table .wval.down{color:#c05050}

/* History */
.hlist{display:flex;flex-direction:column;gap:6px}
.hitem{background:#fff;border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.02);cursor:pointer}
.hitem:active{background:#f8f9fb}
.hitem .hdate{font-size:13px;font-weight:500;color:#3a4a5a}
.hitem .hsub{font-size:11px;color:#8898b0;margin-top:2px}
.hitem .hval{font-size:16px;font-weight:700}
.hitem .hval.up{color:#2e8b57}
.hitem .hval.down{color:#c05050}

/* FAB */
.fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);width:56px;height:56px;border-radius:50%;background:#3b5f9e;color:#fff;font-size:28px;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(59,95,158,.3);z-index:50;display:flex;align-items:center;justify-content:center}
.fab:active{transform:translateX(-50%) scale(.93)}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal.on{display:flex}
.sheet{background:#fff;width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:20px 18px 34px;animation:up .25s ease-out}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet .handle{width:36px;height:4px;border-radius:2px;background:#d0d4da;margin:0 auto 18px}
.sheet h3{font-size:18px;font-weight:700;text-align:center;margin-bottom:20px;color:#1a2538}
.frow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f0f2f5}
.frow .fl{font-size:14px;color:#4a5a6a;display:flex;align-items:center;gap:8px}
.frow .fl .dot{width:10px;height:10px;border-radius:3px}
.frow input{width:120px;padding:10px 12px;border:1px solid #dde0e6;border-radius:10px;font-size:16px;text-align:right;outline:none;background:#f8f9fb;font-family:inherit}
.frow input:focus{border-color:#3b5f9e;background:#fff}
.sheet .btns{display:flex;gap:10px;margin-top:20px}
.sheet .btns button{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.btn-save{background:#3b5f9e;color:#fff}
.btn-save:active{transform:scale(.97)}
.btn-cancel{background:#eef1f5;color:#6a7a8a}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(120px);z-index:200;background:#1a2538;color:#fff;padding:10px 20px;border-radius:10px;font-size:14px;transition:transform .3s;pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}

/* Nav */
.nav{display:flex;background:#fff;border-top:1px solid #eef1f5;padding:8px 14px;gap:4px}
.nav button{flex:1;padding:10px 6px;border:none;background:none;font-size:12px;font-weight:600;color:#8898b0;cursor:pointer;border-radius:10px;font-family:inherit}
.nav button.active{color:#3b5f9e;background:#eef2f8}
</style>
</head>
<body>
<div id="app">
  <div class="topbar"><h1>关门</h1><span class="date" id="topDate"></span></div>

  <!-- Tab: 仪表盘 -->
  <div class="dash" id="tabDash">
    <div class="cards" id="cardsArea"></div>
    <div class="sec-head"><h2>营收结构</h2></div>
    <div class="chart-wrap" id="chartsArea"></div>
    <div class="quick" id="quickArea"></div>
    <div class="sec-head"><h2>本周</h2></div>
    <div class="week-table" id="weekArea"></div>
  </div>

  <!-- Tab: 历史 -->
  <div class="dash" id="tabHistory" style="display:none">
    <div class="sec-head"><h2>全部记录</h2></div>
    <div class="hlist" id="histArea"></div>
  </div>

  <div class="nav">
    <button class="active" id="navDash">📊 仪表盘</button>
    <button id="navHist">📋 历史</button>
    <button id="navExport">📤 导出</button>
  </div>
  <button class="fab" id="fabAdd">+</button>
</div>

<div class="modal" id="modal">
  <div class="sheet">
    <div class="handle"></div>
    <h3>今日对账</h3>
    <div class="frow"><span class="fl"><span class="dot" style="background:#4a90d9"></span>微信</span><input id="mw" type="number" placeholder="0" inputmode="numeric"></div>
    <div class="frow"><span class="fl"><span class="dot" style="background:#f0a050"></span>支付宝</span><input id="ma" type="number" placeholder="0" inputmode="numeric"></div>
    <div class="frow"><span class="fl"><span class="dot" style="background:#5cb880"></span>现金</span><input id="mc" type="number" placeholder="0" inputmode="numeric"></div>
    <div class="frow"><span class="fl"><span class="dot" style="background:#8b7ec8"></span>进货</span><input id="mcost" type="number" placeholder="0" inputmode="numeric"></div>
    <div class="frow"><span class="fl"><span class="dot" style="background:#e0a060"></span>赊账</span><input id="mcr" type="number" placeholder="0" inputmode="numeric"></div>
    <div class="btns"><button class="btn-cancel" id="btnCancel">取消</button><button class="btn-save" id="btnSave">保存</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ============ DATA ============
const KEY='gm';
function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return[]}}
function save(d){localStorage.setItem(KEY,JSON.stringify(d))}
function today(){return new Date().toISOString().slice(0,10)}
function getAll(){return load().sort((a,b)=>b.date.localeCompare(a.date))}

// ============ INIT DEMO ============
(function(){
  if(!load().length){
    const arr=[];const n=new Date();
    for(let i=6;i>=0;i--){const d=new Date(n);d.setDate(n.getDate()-i);const ds=d.toISOString().slice(0,10);arr.push({date:ds,wx:1900+~~(Math.random()*1700),ali:500+~~(Math.random()*700),cash:200+~~(Math.random()*350),cost:400+~~(Math.random()*600),credit:Math.random()>.5?~~(Math.random()*120):0})}
    save(arr);
  }
})();

// ============ RENDER ============
function fmt(n){return n.toLocaleString()}
function todayData(){return load().find(x=>x.date===today())||null}
function monthData(){const m=today().slice(0,7);return load().filter(x=>x.date.startsWith(m))}
function weekData(){
  const n=new Date();const day=n.getDay();const mon=new Date(n);mon.setDate(n.getDate()-(day===0?6:day-1));mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
  return load().filter(x=>{const d=new Date(x.date);return d>=mon&&d<=sun});
}

function renderDash(){
  const td=todayData();const mth=monthData();const wk=weekData();
  const rev=td?td.wx+td.ali+td.cash:0;const cost=td?td.cost:0;const profit=rev-cost-(td?td.credit:0);
  const mProfit=mth.reduce((s,x)=>s+x.wx+x.ali+x.cash-x.cost-x.credit,0);
  const all=getAll();const yest=all.length>1?all[1]:null;
  const yProfit=yest?yest.wx+yest.ali+yest.cash-yest.cost-yest.credit:0;
  const diff=profit-yProfit;

  // Cards
  document.getElementById('cardsArea').innerHTML=`
    <div class="c-card"><div class="val">¥${fmt(rev)}</div><div class="lbl">今日营收</div></div>
    <div class="c-card"><div class="val">¥${fmt(cost)}</div><div class="lbl">今日成本</div></div>
    <div class="c-card"><div class="val">¥${fmt(profit)}</div><div class="lbl">今日利润</div>${yest?`<div class="trend ${diff>=0?'up':'down'}">较昨日 ${diff>=0?'+':''}¥${fmt(diff)}</div>`:''}</div>
    <div class="c-card"><div class="val">¥${fmt(mProfit)}</div><div class="lbl">本月累计</div><div class="trend" style="color:#8898b0">${mth.length} 天</div></div>
  `;

  // Charts
  const chData=mth.length?mth:load().slice(0,7);
  const tw=chData.reduce((s,x)=>s+x.wx,0);const ta=chData.reduce((s,x)=>s+x.ali,0);const tc=chData.reduce((s,x)=>s+x.cash,0);
  const trev=tw+ta+tc||1;const tcost=chData.reduce((s,x)=>s+x.cost,0);
  const revSegs=[{l:'微信',v:tw,c:'#4a90d9'},{l:'支付宝',v:ta,c:'#f0a050'},{l:'现金',v:tc,c:'#5cb880'}].filter(x=>x.v>0);
  const costSegs=[{l:'进货',v:tcost,c:'#8b7ec8'}];
  document.getElementById('chartsArea').innerHTML=
    `<div class="chart-box"><h3>收款来源</h3>${drawRing(revSegs,trev,'总营收')}</div>
     <div class="chart-box"><h3>成本构成</h3>${tcost?drawRing(costSegs,tcost,'总成本'):'<p style="color:#8898b0;font-size:13px;padding:20px">暂无数据</p>'}</div>`;

  // Week
  const wks=wk.sort((a,b)=>a.date.localeCompare(b.date));
  document.getElementById('weekArea').innerHTML=wks.length?wks.map(x=>{
    const r=x.wx+x.ali+x.cash;const p=r-x.cost-x.credit;
    return `<div class="wrow"><div><div class="wdate">${x.date.slice(5)}</div><div class="wsub">收${fmt(r)} · 进${fmt(x.cost)} · 赊${fmt(x.credit)}</div></div><div class="wval ${p>=0?'up':'down'}">¥${fmt(p)}</div></div>`;
  }).join(''):'<div style="text-align:center;color:#8898b0;padding:20px">本周暂无记录</div>';

  // Quick actions
  document.getElementById('quickArea').innerHTML=`
    <button onclick="openModal()"><span class="qicon">✏️</span>记一笔</button>
    <button onclick="renderDash();toast('已刷新')"><span class="qicon">🔄</span>刷新</button>
  `;

  document.getElementById('topDate').textContent=new Date().toLocaleDateString('zh-CN',{month:'short',day:'numeric',weekday:'short'});
}

function drawRing(segs,total,label){
  const r=55;const c=65;const w=18;const circ=2*Math.PI*r;
  let offset=0;let paths='';
  segs.forEach(s=>{
    const pct=s.v/total;const len=pct*circ;
    paths+=`<circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${s.c}" stroke-width="${w}" stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${-(offset*circ)}" stroke-linecap="butt" transform="rotate(-90 ${c} ${c})"/>`;
    offset+=pct;
  });
  const leg=segs.map(s=>`<span><i style="background:${s.c}"></i>${s.l} ${Math.round(s.v/total*100)}%</span>`).join('');
  return `<svg viewBox="0 0 130 130" style="width:120px;height:120px">${paths}<text x="${c}" y="${c-4}" text-anchor="middle" font-size="13" font-weight="700" fill="#1a2538">${label}</text><text x="${c}" y="${c+14}" text-anchor="middle" font-size="10" fill="#8898b0">¥${fmt(total)}</text></svg><div class="legend">${leg}</div>`;
}

function renderHist(){
  const all=getAll();
  document.getElementById('histArea').innerHTML=all.length?all.map(x=>{
    const r=x.wx+x.ali+x.cash;const p=r-x.cost-x.credit;
    return `<div class="hitem" onclick="editData('${x.date}')"><div><div class="hdate">${x.date}</div><div class="hsub">收${fmt(r)} · 进${fmt(x.cost)} · 赊${fmt(x.credit)}</div></div><div class="hval ${p>=0?'up':'down'}">¥${fmt(p)}</div></div>`;
  }).join(''):'<div style="text-align:center;color:#8898b0;padding:40px">暂无记录</div>';
}

// ============ MODAL ============
function openModal(ds){
  const td=ds?load().find(x=>x.date===ds):todayData();
  document.getElementById('mw').value=td?td.wx:'';document.getElementById('ma').value=td?td.ali:'';
  document.getElementById('mc').value=td?td.cash:'';document.getElementById('mcost').value=td?td.cost:'';
  document.getElementById('mcr').value=td?td.credit:'';
  document.getElementById('modal').classList.add('on');
  document.getElementById('mw').focus();
}
function closeModal(){document.getElementById('modal').classList.remove('on')}
function editData(ds){openModal(ds)}

document.getElementById('btnSave').onclick=function(){
  const data={date:today(),wx:+document.getElementById('mw').value||0,ali:+document.getElementById('ma').value||0,cash:+document.getElementById('mc').value||0,cost:+document.getElementById('mcost').value||0,credit:+document.getElementById('mcr').value||0};
  const all=load();const idx=all.findIndex(x=>x.date===data.date);
  if(idx>=0)all[idx]=data;else all.push(data);
  save(all);closeModal();renderDash();renderHist();toast('✅ 已保存');
};
document.getElementById('btnCancel').onclick=closeModal;
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.getElementById('fabAdd').onclick=function(){openModal()};

// ============ NAV ============
document.getElementById('navDash').onclick=function(){
  document.getElementById('tabDash').style.display='block';document.getElementById('tabHistory').style.display='none';
  document.getElementById('navDash').classList.add('active');document.getElementById('navHist').classList.remove('active');
  renderDash();
};
document.getElementById('navHist').onclick=function(){
  document.getElementById('tabDash').style.display='none';document.getElementById('tabHistory').style.display='block';
  document.getElementById('navHist').classList.add('active');document.getElementById('navDash').classList.remove('active');
  renderHist();
};
document.getElementById('navExport').onclick=function(){
  const all=load();if(!all.length){toast('暂无数据');return}
  let csv='日期,微信,支付宝,现金,进货,赊账,利润\n';
  all.forEach(x=>{const r=x.wx+x.ali+x.cash;csv+=`${x.date},${x.wx},${x.ali},${x.cash},${x.cost},${x.credit},${r-x.cost-x.credit}\n`});
  const b=new Blob(['﻿'+csv],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='关门_'+today()+'.csv';a.click();URL.revokeObjectURL(u);toast('📤 已导出');
};

// ============ TOAST ============
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._tid);t._tid=setTimeout(function(){t.classList.remove('on')},1800)}

// ============ INIT ============
renderDash();
if('serviceWorker' in navigator)window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})});
</script>
</body>
</html>
