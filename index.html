<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0b0f16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="了">
<meta name="description" content="了 — 每天睡前，放下今天。">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%230b0f16'/><text x='50' y='74' text-anchor='middle' fill='%23c9a96e' font-size='64' font-weight='300' font-family='system-ui'>了</text></svg>">
<title>了</title>
<style>
/* ============ ROOT ============ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:#0b0f16;color:#d4cec4;min-height:100dvh;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;
}
/* Night sky ambient */
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 300px 400px at 50% 30%,rgba(201,169,110,.03) 0%,transparent 60%),
              radial-gradient(ellipse 200px 200px at 80% 70%,rgba(201,169,110,.02) 0%,transparent 50%);
  pointer-events:none;
}

#app{
  width:100%;max-width:420px;height:100dvh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:40px 28px;position:relative;z-index:1;
}

/* ============ SCREENS ============ */
.scr{display:none;flex-direction:column;align-items:center;width:100%}
.scr.on{display:flex}

/* ============ MAIN RITUAL SCREEN ============ */
.moon{font-size:40px;margin-bottom:28px;opacity:.7;animation:float 4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.greeting{font-size:14px;color:#6b6358;margin-bottom:18px;letter-spacing:1px}
.question{font-size:22px;color:#c4bcae;font-weight:300;text-align:center;line-height:1.5;margin-bottom:24px;letter-spacing:.5px}

/* Emotion tags */
.tags{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:28px}
.tag{
  padding:10px 20px;border-radius:24px;font-size:14px;cursor:pointer;transition:all .25s;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);color:#8b8278;
  letter-spacing:.5px;
}
.tag:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.08)}
.tag.pick{border-color:rgba(201,169,110,.3);background:rgba(201,169,110,.06);color:#c9a96e}

/* Optional text */
.text-area{
  width:100%;max-width:300px;padding:14px 16px;background:rgba(255,255,255,.015);
  border:1px solid rgba(255,255,255,.04);border-radius:14px;color:#9b9388;
  font-size:15px;outline:none;font-family:inherit;resize:none;text-align:center;
  line-height:1.7;transition:all .3s;margin-bottom:10px;height:0;opacity:0;overflow:hidden;
}
.text-area.show{height:80px;opacity:1;margin-bottom:28px}
.text-area:focus{border-color:rgba(201,169,110,.2)}
.text-area::placeholder{color:#4a443c}

.text-toggle{font-size:12px;color:#4a443c;cursor:pointer;margin-bottom:28px;transition:color .2s}
.text-toggle:hover{color:#6b6358}

/* Submit button */
.btn-letgo{
  width:80px;height:80px;border-radius:50%;border:1px solid rgba(201,169,110,.2);
  background:rgba(201,169,110,.04);color:#c9a96e;font-size:18px;
  cursor:pointer;transition:all .3s;letter-spacing:1px;font-family:inherit;
  display:flex;align-items:center;justify-content:center;
}
.btn-letgo:hover{background:rgba(201,169,110,.1);border-color:rgba(201,169,110,.35);box-shadow:0 0 32px rgba(201,169,110,.08)}
.btn-letgo:active{transform:scale(.94)}

/* ============ CEREMONY OVERLAY ============ */
.overlay{
  position:fixed;inset:0;z-index:100;background:#0b0f16;display:none;
  flex-direction:column;align-items:center;justify-content:center;
}
.overlay.on{display:flex}

/* Moon phases during ceremony */
.ceremony-moon{font-size:32px;margin-bottom:40px;opacity:.5;animation:float 3s ease-in-out infinite}

/* Water + boat scene */
.scene{position:relative;width:260px;height:200px;margin-bottom:40px}
.water{
  position:absolute;bottom:0;left:0;right:0;height:80px;
  background:linear-gradient(to bottom,transparent,rgba(32,36,48,.6),rgba(24,28,40,.8));
  border-radius:0 0 40% 60%;
  animation:ripple 3s ease-in-out infinite;
}
.water::after{
  content:'';position:absolute;top:-20px;left:10%;right:10%;height:2px;
  background:rgba(201,169,110,.08);border-radius:50%;
}
@keyframes ripple{0%,100%{border-radius:0 0 40% 60%}50%{border-radius:0 0 60% 40%}}

.boat{
  position:absolute;bottom:70px;left:50%;transform:translateX(-50%);
  font-size:36px;transition:all 4s cubic-bezier(.4,0,.2,1);z-index:2;
}
.boat.sailing{bottom:280px;opacity:0;transform:translateX(-50%) rotate(-5deg) scale(.6)}

.boat-text{
  position:absolute;bottom:110px;left:50%;transform:translateX(-50%);
  font-size:12px;color:#8b8278;text-align:center;max-width:200px;
  transition:all 4s cubic-bezier(.4,0,.2,1);z-index:1;line-height:1.6;
}
.boat-text.sailing{bottom:320px;opacity:0}

/* Particles */
.particles{position:absolute;inset:0;pointer-events:none}
.dot{
  position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(201,169,110,.4);
  animation:driftUp 4s ease-out forwards;opacity:0;
}
@keyframes driftUp{0%{opacity:0;transform:translateY(0)}20%{opacity:.8}100%{opacity:0;transform:translateY(-120px)}}

/* Goodnight screen */
.goodnight{display:none;flex-direction:column;align-items:center;text-align:center}
.goodnight.on{display:flex}
.gn-line1{font-size:18px;color:#9b9388;margin-bottom:8px;font-weight:300;letter-spacing:1px}
.gn-line2{font-size:28px;color:#c9a96e;font-weight:300;letter-spacing:2px;margin-bottom:40px}
.gn-moon{font-size:60px;opacity:.3;animation:float 5s ease-in-out infinite}

/* ============ SETTINGS ============ */
.settings-btn{
  position:fixed;top:20px;right:20px;z-index:50;width:32px;height:32px;
  border-radius:50%;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.03);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:#4a443c;font-size:12px;transition:all .2s;
}
.settings-btn:hover{color:#6b6358;border-color:rgba(255,255,255,.06)}

.back-btn{
  position:fixed;top:20px;left:20px;z-index:50;background:none;border:none;
  color:#4a443c;font-size:13px;cursor:pointer;font-family:inherit;letter-spacing:.5px;
}
.back-btn:hover{color:#8b8278}

.settings-scr{
  width:100%;max-width:300px;display:flex;flex-direction:column;gap:16px
}
.settings-scr h2{font-size:18px;font-weight:300;color:#b4aca0;margin-bottom:8px;text-align:center}
.set-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.02)}
.set-label{font-size:14px;color:#8b8278}
.set-val{font-size:13px;color:#5b5448}
.set-hint{font-size:11px;color:#3a3430;text-align:center;line-height:1.7;margin-top:12px}
.set-btn{
  padding:8px 18px;border-radius:16px;font-size:13px;cursor:pointer;font-family:inherit;
  background:rgba(201,169,110,.06);border:1px solid rgba(201,169,110,.15);color:#b4a080;transition:all .2s;
  letter-spacing:.5px;
}
.set-btn:hover{background:rgba(201,169,110,.12)}
.set-btn:active{transform:scale(.95)}

/* Annual report */
.report{text-align:center;line-height:2.2}
.report h3{font-size:20px;font-weight:300;color:#c4bcae;margin-bottom:20px}
.report .big-num{font-size:48px;font-weight:200;color:#c9a96e;margin:8px 0}
.report p{font-size:14px;color:#8b8278}

/* Toast */
.toast{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(120px);z-index:200;
  background:rgba(20,18,26,.95);border:1px solid rgba(201,169,110,.1);
  color:#9b9080;padding:10px 20px;border-radius:12px;font-size:13px;
  transition:transform .35s;pointer-events:none;
}
.toast.on{transform:translateX(-50%) translateY(0)}

@media(max-width:360px){
  .question{font-size:19px}.tags{gap:8px}.tag{padding:9px 16px;font-size:13px}
}
</style>
</head>
<body>

<div id="app">
  <!-- ====== MAIN RITUAL ====== -->
  <div class="scr on" id="main">
    <div class="moon">🌙</div>
    <div class="greeting" id="greeting"></div>
    <div class="question">今天有什么<br>放不下的？</div>
    <div class="tags" id="emotionTags">
      <span class="tag" data-e="焦虑">焦虑</span>
      <span class="tag" data-e="遗憾">遗憾</span>
      <span class="tag" data-e="期待">期待</span>
      <span class="tag" data-e="生气">生气</span>
      <span class="tag" data-e="说不清">说不清</span>
    </div>
    <div class="text-toggle" id="textToggle">⋯ 想说几句？</div>
    <textarea class="text-area" id="textArea" rows="2" placeholder="可以说，也可以不说。"></textarea>
    <button class="btn-letgo" id="btnLetGo">放下</button>
  </div>

  <!-- ====== CEREMONY ====== -->
  <div class="overlay" id="ceremony">
    <div class="ceremony-moon">🌙</div>
    <div class="scene">
      <div class="particles" id="particles"></div>
      <div class="boat-text" id="boatText"></div>
      <div class="boat" id="boat">⛵</div>
      <div class="water"></div>
    </div>
  </div>

  <!-- ====== GOODNIGHT ====== -->
  <div class="overlay" id="goodnightScr">
    <div class="goodnight on">
      <div class="gn-line1">今天结束了</div>
      <div class="gn-line2">晚安</div>
      <div class="gn-moon">🌙</div>
    </div>
  </div>

  <!-- ====== SETTINGS ====== -->
  <div class="scr" id="settings">
    <div class="settings-scr">
      <h2>⚙</h2>
      <div class="set-item"><span class="set-label">动画主题</span><span class="set-val">纸船（免费）</span></div>
      <div class="set-item"><span class="set-label">记录天数</span><span class="set-val" id="setDays">0 天</span></div>
      <div class="set-item"><span class="set-label">放下次数</span><span class="set-val" id="setCount">0 次</span></div>
      <button class="set-btn" id="btnReport" style="width:100%;margin-top:4px">📋 我的年度情绪报告</button>
      <button class="set-btn" id="btnClear" style="width:100%;color:#8b6b60;border-color:rgba(180,120,100,.15);background:rgba(180,120,100,.04)">清空所有记录</button>
      <div class="set-hint">
        你的每一句话都存在本机。<br>没有人能看到，包括你自己。<br>除非你打开年度报告。
      </div>
    </div>
  </div>

  <!-- ====== ANNUAL REPORT ====== -->
  <div class="scr" id="reportScr">
    <div class="report" id="reportContent"></div>
  </div>
</div>

<!-- Settings button -->
<button class="settings-btn" id="btnSettings" title="设置">⚙</button>
<button class="back-btn" id="btnBack" style="display:none">← 返回</button>

<div class="toast" id="toast"></div>

<script>
// ==================== STATE ====================
const ST={emotion:'',text:'',screen:'main'};
const $=id=>document.getElementById(id);
const EMOTIONS=['焦虑','遗憾','期待','生气','说不清'];

// ==================== PERSISTENCE ====================
function getHistory(){try{return JSON.parse(localStorage.getItem('le_history')||'[]')}catch(e){return[]}}
function saveEntry(e,t){const h=getHistory();h.push({date:new Date().toISOString(),emotion:e,text:t});if(h.length>500)h.splice(0,h.length-500);localStorage.setItem('le_history',JSON.stringify(h))}
function getCount(){return getHistory().length}
function getDays(){const ds=new Set(getHistory().map(x=>x.date.slice(0,10)));return ds.size}
function clearHistory(){localStorage.removeItem('le_history')}

// ==================== GREETING ====================
function setGreeting(){
  const h=new Date().getHours();const g=$('greeting');
  if(h>=5&&h<12)g.textContent='早上好';
  else if(h>=12&&h<17)g.textContent='下午好';
  else if(h>=17&&h<21)g.textContent='傍晚好';
  else if(h>=21||h<4)g.textContent='夜深了';
  else g.textContent='该睡了';
}

// ==================== MAIN INTERACTIONS ====================
function initMain(){
  ST.emotion='';ST.text='';$('textArea').value='';$('textArea').classList.remove('show');
  document.querySelectorAll('.tag').forEach(t=>t.classList.remove('pick'));
  $('btnLetGo').style.opacity='.3';$('btnLetGo').disabled=true;
  $('textToggle').textContent='⋯ 想说几句？';
  setGreeting();
}

// Emotion tags
document.querySelectorAll('.tag').forEach(tag=>{
  tag.addEventListener('click',function(){
    document.querySelectorAll('.tag').forEach(t=>t.classList.remove('pick'));
    this.classList.add('pick');
    ST.emotion=this.dataset.e;
    updateLetGoBtn();
  });
});

// Text toggle
$('textToggle').addEventListener('click',function(){
  const ta=$('textArea');
  if(ta.classList.contains('show')){
    ta.classList.remove('show');this.textContent='⋯ 想说几句？';
  }else{
    ta.classList.add('show');this.textContent='不用了';setTimeout(()=>ta.focus(),300);
  }
});

$('textArea').addEventListener('input',function(){ST.text=this.value.trim();updateLetGoBtn()});

function updateLetGoBtn(){
  const btn=$('btnLetGo');
  if(ST.emotion){btn.style.opacity='1';btn.disabled=false}else{btn.style.opacity='.3';btn.disabled=true}
}

// ==================== CEREMONY ====================
$('btnLetGo').addEventListener('click',async function(){
  if(!ST.emotion)return;
  ST.text=$('textArea').value.trim();
  saveEntry(ST.emotion,ST.text);

  // Switch to main view and start ceremony
  $('main').classList.remove('on');
  const cer=$('ceremony');cer.classList.add('on');

  // Set boat text
  const displayText=ST.text||ST.emotion;
  $('boatText').textContent=displayText.length>30?displayText.slice(0,30)+'…':displayText;

  // Generate particles
  const pc=$('particles');
  pc.innerHTML='';
  for(let i=0;i<30;i++){
    const dot=document.createElement('div');dot.className='dot';
    dot.style.left=(20+Math.random()*60)+'%';dot.style.bottom=(Math.random()*30)+'%';
    dot.style.animationDelay=(Math.random()*2)+'s';dot.style.animationDuration=(3+Math.random()*3)+'s';
    pc.appendChild(dot);
  }

  // Wait a moment then sail
  await sleep(1200);
  const boat=$('boat');const boatText=$('boatText');
  boat.classList.add('sailing');boatText.classList.add('sailing');

  // Wait for sailing to complete then show goodnight
  await sleep(4500);
  cer.classList.remove('on');
  const gn=$('goodnightScr');gn.classList.add('on');

  // Auto-dismiss after a moment
  await sleep(4000);
  gn.classList.remove('on');
  $('main').classList.add('on');
  initMain();
});

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// ==================== NAVIGATION ====================
let prevScreen='main';
function showScreen(name){
  prevScreen=ST.screen;ST.screen=name;
  ['main','settings','reportScr'].forEach(s=>$(s).classList.remove('on'));
  if(name==='main'){$(name).classList.add('on');$('btnSettings').style.display='flex';$('btnBack').style.display='none'}
  else if(name==='settings'){$(name).classList.add('on');$('btnSettings').style.display='none';$('btnBack').style.display='flex';updateSettings()}
  else if(name==='reportScr'){$(name).classList.add('on');$('btnSettings').style.display='none';$('btnBack').style.display='flex';renderReport()}
  // Hide overlay screens
  $('ceremony').classList.remove('on');$('goodnightScr').classList.remove('on');
}
function updateSettings(){$('setDays').textContent=getDays()+' 天';$('setCount').textContent=getCount()+' 次'}
function goBack(){showScreen('main')}

// ==================== SETTINGS ====================
$('btnSettings').addEventListener('click',()=>showScreen('settings'));
$('btnBack').addEventListener('click',goBack);
$('btnClear').addEventListener('click',function(){
  if(confirm('确定清空所有记录？此操作不可撤销。')){clearHistory();updateSettings();toast('已清空')}
});

// ==================== ANNUAL REPORT ====================
function renderReport(){
  const h=getHistory();
  if(!h.length){$('reportContent').innerHTML=`<h3>📋</h3><p>还没有记录。<br>每天来一次，<br>一年后这里会有你的情绪地图。</p>`;return}
  // Stats
  const total=h.length;const days=new Set(h.map(x=>x.date.slice(0,10))).size;
  // Most common emotion
  const ec={};h.forEach(x=>{ec[x.emotion]=(ec[x.emotion]||0)+1});
  const topE=Object.entries(ec).sort((a,b)=>b[1]-a[1])[0];
  // Longest text
  let longest=h[0];h.forEach(x=>{if((x.text||'').length>(longest.text||'').length)longest=x});
  // First entry
  const first=new Date(h[0].date);
  // Recent month
  const now=new Date();const monthAgo=new Date(now-30*86400000);
  const recent=h.filter(x=>new Date(x.date)>monthAgo).length;

  $('reportContent').innerHTML=`
    <h3>📋 你的情绪报告</h3>
    <p>从 ${first.getFullYear()}年${first.getMonth()+1}月${first.getDate()}日 开始<br>你来了 <span class="big-num">${total}</span> 次</p>
    <p style="margin-top:16px">在 <span class="big-num">${days}</span> 个夜晚<br>你放下了些什么</p>
    <p style="margin-top:16px">你最常放下的情绪是<br><span style="font-size:28px;font-weight:300;color:#c9a96e">${topE?topE[0]:'—'}</span><br>共 ${topE?topE[1]:0} 次</p>
    ${longest.text?`<p style="margin-top:16px">${new Date(longest.date).getMonth()+1}月${new Date(longest.date).getDate()}日那天<br>你写了最长的一段话：<br><span style="color:#9b9388;font-size:13px">${longest.text.slice(0,50)}${longest.text.length>50?'…':''}</span></p>`:''}
    <p style="margin-top:16px">最近30天你来了 <span style="font-size:24px;color:#c9a96e">${recent}</span> 次</p>
    <p style="margin-top:20px;color:#5b5448;font-size:12px">记录越多，报告越丰富。<br>明年今日，再来看看。</p>
  `;
}
$('btnReport').addEventListener('click',()=>showScreen('reportScr'));

// ==================== TOAST ====================
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('on');clearTimeout(t._tid);t._tid=setTimeout(()=>t.classList.remove('on'),2000)}

// ==================== INIT ====================
function init(){
  initMain();showScreen('main');
  // Hide settings/back buttons initially
  $('btnBack').style.display='none';
}
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{})})}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
